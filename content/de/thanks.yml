header:
  title: Herzlichen Dank!
  lede: Ihre Großzügigkeit ermöglicht das Fortbestehen der Lehren
body:
  p1: Ihre Spende ist erfolgreich eingegangen. Ihre Unterstützung trägt direkt dazu
    bei, die Lehren der Dzongpa-Linie in Europa zu bewahren und weiterzugeben.
  p2: Sie erhalten in Kürze eine Bestätigungs-E-Mail von Stripe mit einer Zusammenfassung
    Ihrer Spende. Wenn Sie eine Spendenbescheinigung benötigen, schreiben Sie uns bitte
    an <a href="mailto:secretaria@dzongpaeuropa.org">secretaria@dzongpaeuropa.org</a>
    mit Ihrem vollständigen Namen und Ihrer Postanschrift.
