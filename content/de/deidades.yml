header:
  title: "Praktiken und Gottheiten der Dzongpa-Linie"
  lede: "Ein zugänglicher Leitfaden zum Verständnis der traditionellen Bedeutung der Praktiken und Pujas der Dzongpa-Linie."
intro: "Dieser Katalog vereint öffentliche Beschreibungen von Praktiken und Gottheiten, die mit der Sakya-Dzongpa-Linie verbunden sind. Sein Ziel ist es, Personen, die an den Aktivitäten von Dzongpa Europa teilnehmen, einen kulturellen, historischen und devotionalen Kontext zu bieten."
nota_contexto: "Traditionelle Ausdrücke über Schutz, Hindernisse, Langlebigkeit, Reinigung oder Reichtum werden in ihrem eigenen religiösen und symbolischen Rahmen präsentiert. Sie stellen keine medizinischen, psychologischen oder finanziellen Versprechen dar und ersetzen keine professionelle Beratung."
nota_restringidas: "Einige Praktiken erfordern Übertragung, Erlaubnis oder spezifische Anweisungen eines qualifizierten Lehrers. Wenn eine Praktik als eingeschränkt markiert ist, werden nur kontextuelle Informationen bereitgestellt."
