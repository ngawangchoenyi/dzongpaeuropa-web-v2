  title: Mitglied werden · Dzongpa Europa
  description: "Werden Sie Freund, Unterstützer, Beschützer oder Wohltäter und helfen Sie, die Unterweisungen und die Sakya-Dzongpa-Linie in Europa zu erhalten."
  slug: join
  active: join
  es_slug: hazte-socio
header:
  title: Mitglied werden
  lede: Unterstützen wir gemeinsam die Bewahrung der Linie
lead: Mitglied des Kulturvereins Dzongpa zu werden ist eine direkte Möglichkeit, die
  Entwicklung von Dzongpa Europa zu unterstützen und dazu beizutragen, die Lehren
  des Dharma mehr Menschen zugänglich zu machen.
p2: Die Beiträge der Mitglieder ermöglichen es, Grundausgaben zu decken, Aktivitäten
  zu organisieren, Meister einzuladen, Räume zu mieten, Materialien zu übersetzen,
  die Website zu unterhalten und einen stabilen Fonds für zukünftige Retreats und
  Unterweisungen aufzubauen.
p3: Jeder Beitrag, groß oder klein, hilft dabei, die Bedingungen zu schaffen, damit
  die tibetische Kultur und der Buddhismus der Dzongpa-Linie in unserer Gemeinschaft
  gedeihen können.
