header:
  title: Kontakt
  lede: Wir sind für Sie da
lead: Wenn Sie Informationen erhalten, an Aktivitäten teilnehmen, Mitglied werden,
  als Freiwilliger mitarbeiten oder das Projekt unterstützen möchten, schreiben Sie
  uns. Wir antworten auf Anfragen auf Spanisch, Englisch und Chinesisch.
write_title: Schreiben Sie uns
write_intro: Möchten Sie uns lieber direkt schreiben? Senden Sie uns eine E-Mail an
  <a href="mailto:secretaria@dzongpaeuropa.org"><strong>secretaria@dzongpaeuropa.org</strong></a>
  und wir werden so schnell wie möglich antworten.
form_ok_title: Nachricht gesendet
form_ok_text: Vielen Dank für Ihre Nachricht. Wir werden innerhalb von 3 bis 5 Werktagen
  antworten.
form_err_text: Beim Senden der Nachricht ist ein Fehler aufgetreten. Bitte versuchen
  Sie es erneut oder schreiben Sie uns direkt an <a href="mailto:secretaria@dzongpaeuropa.org"
  style="color:#c0392b; font-weight:600;">secretaria@dzongpaeuropa.org</a>.
