patrimony_title: Sachspenden und Vermögenswerte
patrimony_p: Der Verein kann auch nicht-monetäre Spenden oder Sachspenden — bewegliche
  Güter, Immobilien, Bibliothek, Praxisgegenstände — empfangen, sofern sie mit seinen
  kulturellen und spirituellen Zielen vereinbar sind. Bei Interesse schreiben Sie
  uns an <a href="mailto:secretaria@dzongpaeuropa.org">secretaria@dzongpaeuropa.org</a>.
tax_title: Steuerliche Aspekte
tax_p: "Der Kulturverein Dzongpa ist im Vereinsregister der Valencianischen Gemeinschaft
  unter der Nummer <strong>CV-01-062727-V</strong> (Erste Sektion) eingetragen. Als
  gemeinnützige Einrichtung stellen wir eine jährliche Spendenbescheinigung aus,
  die Ihnen gegebenenfalls steuerliche Abzüge für Spenden an gemeinnützige
  Organisationen ermöglicht. Dafür benötigen wir Ihren vollständigen Namen,
  Ihre Steueridentifikationsnummer und Ihre Postanschrift."