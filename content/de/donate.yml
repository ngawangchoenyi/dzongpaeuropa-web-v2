  description: "Unterstützen Sie Dzongpa Europa mit Ihrer Spende: Unterweisungen, Retreats, Textübersetzungen und Erhalt der Sakya-Dzongpa-Linie in Europa."
  slug: donate
  active: ''
  es_slug: donaciones
header:
  title: Spenden
  lede: Ein Beitrag, damit die Lehren aufblühen können
lead: Spenden helfen dabei, die Aktivitäten von Dzongpa Europa zu unterstützen und
  die notwendigen Bedingungen zu schaffen, um die Lehren der Dzongpa-Linie zu bewahren
  und zu teilen.
p2: Beiträge können für die Organisation von Unterweisungen und Retreats, Meisterbesuche,
  Textübersetzungen, Raummiete, Website-Pflege, Kommunikation, Praxismaterialien und
  den Aufbau eines stabilen Vereinsfonds verwendet werden.
purpose_title: Verwendung der Spenden
purpose_items:
- Einladung von Linienmeistern und Organisation von Retreats.
- Präsenz- und Online-Unterweisungen.
- Übersetzung von Dharma-Texten ins Spanische, Englische und Chinesische.
- Raummiete für Retreats und Unterweisungen.
- Praxismaterialien und Bibliothek.
- Website, Kommunikation und Newsletter.
- Stabiler Vereinsfonds.
- Unterstützung anderer kultureller und spiritueller Linienprojekte.
