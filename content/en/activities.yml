header:
  title: Activities
  lede: Meditation, study, retreats, and community life
lead: Dzongpa Europa organizes a regular program of activities designed to bring the
  teachings of the Dharma and Tibetan culture closer to people from all walks of life.
  We combine open practices for those approaching for the first time with deeper spaces
  for regular practitioners and members.
types_title: Types of activities
med:
  h3: Guided meditation
  p: Regular meditation gatherings aimed at cultivating calm abiding, mindfulness,
    compassion, and inner clarity. Open to people with or without previous experience.
study:
  h3: Dharma study
  p: Introductory and study sessions on Tibetan Buddhism, traditional texts, the teachings
    of lineage masters, and the fundamental principles of the Buddhist path.
talks:
  h3: Cultural talks
  p: Open activities on Tibetan culture, the history of Buddhism, sacred art, iconography,
    rituals, language, and the spiritual traditions of the Himalayas.
retreats:
  h3: Retreats and teachings
  p: Organization of retreats, courses, and teachings with qualified masters, both
    in Valencia and in other places in Europe, including the possibility of visits
    by Rinpoche.
community:
  h3: Community and volunteering
  p: Spaces for encounter among members, practitioners, and supporters, as well as
    opportunities to collaborate in organization, communication, translation, logistics,
    and support for activities.
