header:
  title: His Eminence the VI Gongkar Dorje Dhenpa Rinpoche
  lede: Tenzin Jampal Lungtok Namgyal · Supreme Head of the Dzongpa lineage of the
    Sakya tradition
hero_alt: H.E. the VI Gongkar Dorje Dhenpa Rinpoche on ceremonial throne
lead: His Eminence the VI Gongkar Dorje Dhenpa Rinpoche, Tenzin Jampal Lungtok Namgyal,
  is the Supreme Head of the Dzongpa lineage of the Sakya tradition of Tibetan Buddhism.
  Born in 1977 in Arunachal Pradesh, in northeastern India near the Tibetan border,
  his life and teaching are dedicated to the preservation of the Dzongpa tradition
  and the benefit of beings.
tulku:
  title: Recognition as a tulku
  p1: His predecessor, the V Dorjedenpa Tulku, passed away prematurely in Tibet in
    1959 during the Lhasa uprising. The monks of the Dzongpa lineage repeatedly asked
    His Holiness the Dalai Lama whether their master had reincarnated. After careful
    examination, His Holiness instructed them to direct the search toward northeastern
    India, near the Tibetan border.
  p2: In 1989, Rinpoche was found in Arunachal Pradesh and recognized by His Holiness
    the Dalai Lama, who performed the hair-cutting ceremony and gave him the name
    Tenzin Jampal Lungtok. Later, His Eminence the late Chogye Trichen Rinpoche extended
    his name to Tenzin Jampal Lungtok Namgyal.
  dal02_caption: His Holiness the XIV Dalai Lama officially recognized Rinpoche as
    the reincarnation of the V Dorjedenpa Tulku in 1989.
training:
  title: Training
  p1: His Holiness the Dalai Lama emphasized the importance of Rinpoche receiving
    deep and thorough training. Thus, he entered Sakya College in Dehradun as its
    youngest student, under the guidance of the late Khenpo Migmar Tsering, and graduated
    with distinction in 1999.
  p2: In addition to mastering the thirteen great shastras of the Nalanda tradition
    as taught within the Sakya tradition, Rinpoche received the Compendium of Tantras,
    the Compendium of Sadhanas, the complete Lamdré, and numerous empowerments, transmissions,
    and tantric instructions from His Holiness the 41st Sakya Trichen and other great
    masters of the lineage.
gongkar:
  title: Re-establishment of Gongkar Choede
  p1: In 2003, Rinpoche re-established Gongkar Choede Monastery in Dehradun, India,
    continuing in exile the principal seat of the lineage, originally founded in Tibet
    in 1464. The monastery was inaugurated by His Holiness the Dalai Lama, and on
    that same occasion Rinpoche was enthroned as the Head Lama of the lineage by His
    Holiness the 41st Sakya Trichen.
  p2: At the monastery, Rinpoche completed numerous meditation retreats and mastered
    the tantric rituals of the lineage, fully assuming responsibility for its preservation.
  dal03_caption: The two highest spiritual authorities who have blessed Rinpoche's
    path.
international:
  title: International activity
  p1: Since 2005, Rinpoche has travelled internationally to offer Buddhist teachings
    in various parts of the world. He established the Sakya Dzongpa Vajrayana Community
    in Taipei, where he gives regular teachings, and since then practice communities
    linked to the lineage have formed in India, Taiwan, the United Kingdom, Spain,
    Australia, and Hong Kong.
  p2: At the request of local Buddhists in Arunachal Pradesh, his homeland, Rinpoche
    has undertaken the project of establishing Gongkar Dorje Den there, as a larger
    base from which the Dzongpa tradition may fully revive.
europa:
  title: His guidance for Dzongpa Europa
  p1: The Dzongpa Cultural Association and the Dzongpa Europa project develop under
    Rinpoche's inspiration and spiritual direction, with the wish to create suitable
    conditions for his teachings and those of the Dzongpa lineage to be received,
    studied, and practiced in Europe.
