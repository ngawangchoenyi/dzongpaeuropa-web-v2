header:
  title: Donations
  lede: A contribution so that the teachings may flourish
lead: Donations help sustain the activities of Dzongpa Europa and create the necessary
  conditions to preserve and share the teachings of the Dzongpa lineage.
p2: Contributions may be used for the organization of teachings and retreats, visits
  by masters, translation of texts, rental of spaces, website maintenance, communication,
  practice materials, and the creation of a stable fund for the association.
purpose_title: Purpose of donations
purpose_items:
- Inviting lineage masters and organizing retreats.
- In-person and online teachings.
- Translation of Dharma texts into Spanish, English, and Chinese.
- Rental of spaces for retreats and teachings.
- Practice materials and library.
- Website, communication, and newsletter.
- Stable fund for the association.
- Support for other cultural and spiritual projects of the lineage.
