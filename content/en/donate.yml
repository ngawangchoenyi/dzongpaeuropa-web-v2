patrimony_title: Non-monetary and asset donations
patrimony_p: The association may also receive non-monetary or asset donations — movable
  goods, real estate, libraries, practice objects — provided that they are aligned
  with its cultural and spiritual aims and are accepted in accordance with the applicable
  regulations and the entity's internal agreements. If you wish to make a contribution
  of this kind, write to us at <a href="mailto:secretaria@dzongpaeuropa.org">secretaria@dzongpaeuropa.org</a>
  and we will guide you through the process.
tax_title: Tax aspects
tax_p: "The Dzongpa Cultural Association is registered in the Register of Associations
  of the Valencian Community under number <strong>CV-01-062727-V</strong> (First Section).
  As a non-profit organization, we issue an annual certificate of contributions which
  may, where applicable, allow you to benefit from the tax deductions available for
  donations to non-profit entities. For this purpose, we need your full name,
  tax identification number, and postal address."