page:
  lang: en
  base: _base_en.html
  title: "History of Dzongpa in Spain · Dzongpa Europa"
  description: "From Dehradun to Valencia: the origin and trajectory of the Sakya Dzongpa lineage in Spain, from the first teachings in 2012 to the founding of the association and the blessings of the Sakya Trizins."
  slug: history
  active: history
  es_slug: historia

header:
  title: "History of Dzongpa in Spain"
  lede: "From Dehradun to Valencia, from Valencia to Europe"

hero:
  src: "/assets/img/juventud-rinpoche/juv-05-rinpoche-retrato-v-dorjedenpa-tulku.jpg"
  alt: "H.E. Gongkar Dorje Dhenpa Rinpoche holding an image of the previous Dorje Dhenpa, Jampal Lungthok"
  caption: "H.E. Gongkar Dorje Dhenpa Rinpoche holding an image of the previous Dorje Dhenpa, Jampal Lungthok."

lead: "The presence of the Sakya Dzongpa lineage in Spain has a history that is longer than its current legal form might suggest. Its roots go back to an encounter in Dehradun, India, from which, over time, a practice community, an association, and today the Dzongpa Europa project would emerge."

origin:
  title: "The origin: Dehradun and the encounter with Kunga Tsondru"
  p1: "The origins of Dzongpa in Spain go back to the encounter between H.E. Gongkar Dorje Dhenpa Rinpoche and Kunga Tsondru — José Manuel Sánchez — in autumn 1993 at Sakya College in Dehradun, India. From that meeting arose a friendship and spiritual bond which, in time, led to the first invitation for Rinpoche to teach in Spain."
  photos:
    - src: "/assets/img/india/ind-01-rinpoche-sakya-college-dehradun.jpg"
      alt: "Rinpoche at Sakya College in Dehradun, India"
      caption: "H.E. Gongkar Dorje Dhenpa Rinpoche at Sakya College, Dehradun. 2000."
    - src: "/assets/img/india/ind-02-sakya-college-con-monjes-dehradun.jpg"
      alt: "Rinpoche with monks at Sakya College, Dehradun"
      caption: "H.E. Gongkar Dorje Dhenpa Rinpoche with monks at Sakya College, Dehradun."

ensenanzas_2012:
  title: "First teachings in Spain · 2012"
  p1: "In 2012, H.E. Gongkar Dorje Dhenpa Rinpoche gave teachings at the Sakya Foundation in Pedreguer, Alicante, accompanied by Venerable Khyentse-la, and under the spiritual presence of His Holiness the 41st Sakya Trizin. Those teachings, received by a group of Spanish practitioners, planted the seeds of what would later become a stable community."
  photos:
    - src: "/assets/img/espana/esp-02-ensenanzas-pedreguer-rinpoche-khyentse-la.jpg"
      alt: "Teachings at Pedreguer 2012 — Rinpoche and Khyentse-la"
      caption: "H.E. Gongkar Dorje Dhenpa Rinpoche and Ven. Khyentse-la. Pedreguer, 2012."
    - src: "/assets/img/espana/esp-01-grupo-pedreguer-2012.jpg"
      alt: "Group of practitioners at Pedreguer, 2012"
      caption: "Group of practitioners. Pedreguer, 2012."

tara_2017:
  title: "Peaceful Tara by day and Wrathful Tara by night · 2017"
  p1: "In September 2017, H.E. Gongkar Dorje Dhenpa Rinpoche transmitted for the first time in Spain the teachings and initiations of Peaceful Tara by day and Wrathful Tara by night, a tantric practice of exceptional depth belonging to the Sakya Dzongpa lineage. The event took place at the Sakya Buddhist Centre in Pedreguer, Alicante, known as Paramita, and brought together a large group of practitioners from different parts of Spain."
  p2: "This practice, which integrates the peaceful and wrathful aspects of Tara in a single cycle of transmission, is especially valued within the lineage for its power of protection and its capacity to remove obstacles on the spiritual path. The 2017 transmission marked a milestone in the presence of the Dzongpa lineage in Spain and strengthened the bond between the Spanish community and the living tradition that Rinpoche carries and transmits."
  photos:
    - src: "/assets/img/espana/esp-12-rinpoche-tara-paramita-2017.jpg"
      alt: "H.E. Gongkar Dorje Dhenpa Rinpoche giving teachings at Paramita, Pedreguer, 2017"
      caption: "H.E. Gongkar Dorje Dhenpa Rinpoche during the teachings. Paramita, Pedreguer, 2017."
    - src: "/assets/img/espana/esp-13-rinpoche-ritual-paramita-2017.jpg"
      alt: "H.E. Gongkar Dorje Dhenpa Rinpoche at the altar during the initiation. Paramita, 2017"
      caption: "H.E. Gongkar Dorje Dhenpa Rinpoche at the altar during the initiation. Paramita, 2017."
    - src: "/assets/img/espana/esp-14-ensenanzas-sala-paramita-2017.jpg"
      alt: "View of the hall during the teachings. Paramita, Pedreguer, 2017"
      caption: "View of the hall during the teachings. Paramita, 2017."
    - src: "/assets/img/espana/esp-15-grupo-paramita-2017.jpg"
      alt: "Group of practitioners at the Sakya Buddhist Centre of Pedreguer, September 2017"
      caption: "Group of practitioners. Sakya Buddhist Centre of Pedreguer, September 2017."

valencia_2019:
  title: "Valencia · 2019"
  p1: "In September 2019, Rinpoche visited Valencia, where he bestowed the Ati Yoga initiation of the complete mandala of Guru Rinpoche, within the cycle of Lama Sangdü. During that visit, Rinpoche expressed his wish that a Dzongpa center could be established in the city of Valencia, as a place of practice, study, and preservation of the lineage."
  photo_main:
    src: "/assets/img/espana/esp-06-rinpoche-valencia-2019.jpg"
    alt: "Rinpoche giving teachings in Valencia, September 2019"
    caption: "H.E. Gongkar Dorje Dhenpa Rinpoche in Valencia, September 2019."
  photos_right:
    - src: "/assets/img/espana/esp-07-grupo-valencia-2019.jpg"
      alt: "Group of practitioners during the teachings in Valencia, 2019"
      caption: "Group of practitioners. Valencia, 2019."
    - src: "/assets/img/espana/esp-10-valencia-2019-c.jpg"
      alt: "During the initiation. Valencia, 2019."
      caption: "During the initiation. Valencia, 2019."

grupo_practica:
  title: "Formation of the practice group"
  p1: "Following the aspiration expressed by Rinpoche, in 2020 a practice group linked to the Dzongpa lineage began to take shape. This group gradually created the human, spiritual, and organizational conditions needed to sustain regular activities, receive teachings, and give form to a stable project."

constitucion:
  title: "Founding of the Dzongpa Cultural Association"
  p1: "In 2022, this process crystallized with the formal registration of the Dzongpa Cultural Association, registered in the Register of Associations of the Valencian Community under number <strong>CV-01-062727-V</strong> (First Section), with its headquarters in Valencia. The association was created with the purpose of preserving and sharing the Sakya Dzongpa lineage in Valencia, Spain, and Europe, dedicating itself to the study of Tibetan Buddhism, the practice of meditation, the organization of teachings and retreats, and the creation of favorable conditions for Rinpoche's activities."

bendiciones:
  title: "Blessings of His Holiness the 41st and 42nd Sakya Trizin"
  p1: "In 2022, David Sanz and his wife, Rosi, travelled to Switzerland on behalf of the Dzongpa Cultural Association, where they received the blessings of His Holiness the 42nd Sakya Trizin for the project of a Dzongpa center in Valencia. His Holiness the 41st Sakya Trizin was also present in that context, as he was giving teachings there."
  p2: "During that meeting, His Holiness the 42nd Sakya Trizin instructed David and Rosi to go to Paramita — the former Sakya Foundation — in La Sella, Pedreguer, where both Sakya Trizins were to give teachings that same year, so that they could discuss the project of the Dzongpa center in Valencia in greater detail."
  p3: "Later, at Paramita, during a private meeting, His Holiness the 41st Sakya Trizin bestowed his blessings for the Dzongpa center in Valencia. As an auspicious gesture, he gifted a thangka of Buddha Shakyamuni and expressed his wish that the necessary conditions be created for Gongkar Dorje Dhenpa Rinpoche to transmit his teachings and develop his Dharma activities."
  p4: "These meetings represented an important spiritual support for the association and strengthened the aspiration to establish a stable space for practice, study, and encounter around the Sakya Dzongpa lineage."
  photos_left:
    - src: "/assets/img/espana/esp-08-ss41-sakya-trizin-suiza-2022.jpg"
      alt: "His Holiness Gongma Trichen Rinpoche. Switzerland, 2022"
      caption: "His Holiness Sakya Trizin 41: Gongma Trichen Rinpoche. Switzerland, 2022."
    - src: "/assets/img/espana/esp-11-suiza-2022-c.jpg"
      alt: "H.H. Gongma Trichen Rinpoche and H.H. the 42nd Sakya Trizin with the group. Switzerland, 2022."
      caption: "H.H. Sakya Trizin 41 and H.H. Sakya Trizin 42 with the group. Switzerland, 2022."
  photo_right:
    src: "/assets/img/espana/esp-09-rinpoche-david-suiza-2022.jpg"
    alt: "Rinpoche and David Sanz in Switzerland, 2022"
    caption: "H.H. Sakya Trizin 42 and David Sanz, president of the association. Switzerland, 2022."

desarrollo:
  title: "A history in development"
  p1: "Since then, Dzongpa Europa has continued working to consolidate a practice community in Valencia and to open spaces for encounter in Spain and Europe. The association maintains the aspiration to preserve the Sakya Dzongpa lineage, support Rinpoche's activities, and offer those interested a respectful and living access to the teachings of the Dharma."
  p2: "Today, this journey enters a new phase: <strong>Dzongpa Europa</strong>, an initiative that seeks to build bridges between the Sakya Dzongpa tradition and interested people across Europe, forming part of the international network of the lineage, which already has centers in India, Taiwan, the United Kingdom, Spain, Australia, and Hong Kong."
  photo:
    src: "/assets/img/espana/esp-16-rinpoche-sonriendo-paramita-2017.jpg"
    alt: "H.E. Gongkar Dorje Dhenpa Rinpoche smiling during the teachings at Paramita, 2017"

quotes:
  - text: "&ldquo;Since bodhichitta is what determines whether or not our practice becomes the path to enlightenment, bodhichitta is truly the heart essence of all the Buddha's teachings.&rdquo;"
    cite: "— H.H. The Dalai Lama"
  - text: "&ldquo;When your practice becomes a daily habit, then it ceases to be difficult.&rdquo;"
    cite: "— H.E. Gongkar Dorje Dhenpa Rinpoche"

timeline:
  title: "Timeline"
  items:
    - year: "Autumn 1993 · Dehradun, India"
      text: "Encounter between H.E. Gongkar Dorje Dhenpa Rinpoche and Kunga Tsondru at Sakya College in Dehradun. The first invitation to teach in Spain is born."
    - year: "2012 · Pedreguer (Alicante)"
      text: "Rinpoche gives the first teachings in Spain at the Sakya Foundation in Pedreguer, accompanied by Venerable Khyentse-la, under the spiritual presence of His Holiness the 41st Sakya Trizin."
    - year: "September 2017 · Pedreguer (Alicante)"
      text: "H.E. Gongkar Dorje Dhenpa Rinpoche transmits for the first time in Spain the teachings and initiations of Peaceful Tara by day and Wrathful Tara by night, at the Sakya Buddhist Centre of Pedreguer."
    - year: "September 2019 · Valencia"
      text: "Rinpoche visits Valencia and bestows the Ati Yoga initiation of the complete mandala of Guru Rinpoche. He expresses his wish for a Dzongpa center to be established in Valencia."
    - year: "2020 · Formation of the practice group"
      text: "A practice group linked to the Dzongpa lineage begins to take shape, gradually creating the spiritual and organizational conditions to sustain regular activities."
    - year: "14 January 2022 · Valencia"
      text: "Formal founding of the Dzongpa Cultural Association, registered in the Register of Associations of the Valencian Community (CV-01-062727-V)."
    - year: "2022 · Switzerland"
      text: "David Sanz and Rosi receive the blessings of His Holiness the 42nd Sakya Trizin for the Dzongpa center project in Valencia, in the presence of His Holiness the 41st Sakya Trizin."
    - year: "2022 · Paramita, Pedreguer"
      text: "Private meeting with His Holiness the 41st Sakya Trizin at Paramita: he bestows his blessings for the center and gifts a thangka of Buddha Shakyamuni."
    - year: "February 2026 · Valencia"
      text: "Cycle of teachings and initiations in Valencia with Rinpoche. First official visit within the Dzongpa Europa framework."
    - year: "2026 · Europe"
      text: "Launch of Dzongpa Europa: expansion of the project to a continental scope, within the international network of the Sakya Dzongpa lineage."

