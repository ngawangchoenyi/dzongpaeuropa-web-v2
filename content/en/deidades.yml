header:
  title: "Practices and Deities of the Dzongpa Lineage"
  lede: "An accessible guide to understanding the traditional meaning of the practices and pujas of the Dzongpa lineage."
intro: "This catalogue brings together public descriptions of practices and deities associated with the Sakya Dzongpa lineage. Its purpose is to offer cultural, historical and devotional context to those who participate in the activities of Dzongpa Europa."
nota_contexto: "Traditional expressions about protection, obstacles, longevity, purification or wealth are presented within their own religious and symbolic framework. They do not constitute medical, psychological or financial promises, nor do they replace professional guidance."
nota_restringidas: "Some practices require transmission, permission or specific instructions from a qualified teacher. When a practice is marked as restricted, only contextual information is provided."
labels:
  beneficios: "Associated traditional benefits"
