header:
  title: "About us"
  lede: "A cultural association dedicated to preserving the Sakya Dzongpa lineage"

association:
  title: "The association"
  p1: "The Dzongpa Cultural Association is a non-profit organization dedicated to promoting Tibetan culture, the study of Tibetan Buddhism, the practice of meditation, and the preservation of the teachings of the Dzongpa lineage."
  p2: "It was created with the purpose of establishing an open, respectful, and stable space where interested people can approach the Dharma, take part in cultural activities, receive teachings, practice meditation, and collaborate in projects that benefit the community."

dzongpa_europa:
  title: "Dzongpa Europa"
  p1: "Dzongpa Europa is the European expression of the association's work. Under the guidance of H.E. the VI Gongkar Dorje Dhenpa Rinpoche, this project seeks to build bridges between the Tibetan tradition of the Dzongpa lineage and people interested in Europe. It forms part of an international network with centers in India, Taiwan, the United Kingdom, Spain, Australia, and Hong Kong, in addition to the root monastery, Gongkar Choede."

purpose:
  title: "Our purpose"
  p1: "To help keep the Buddhist teachings of the Dzongpa lineage alive and accessible by creating the right conditions to invite masters, organize retreats, translate texts, sustain regular activities, and build a strong community of practitioners and supporters in Europe."

core_values:
  title: "Values"
  items:
    - title: "Authenticity."
      text: "Fidelity to the lineage and to the teachings transmitted by Rinpoche and the qualified masters of the Sakya Dzongpa tradition."
    - title: "Openness."
      text: "An inclusive welcome to people of any background, age, culture, or level of practice."
    - title: "Service."
      text: "Dedication to the benefit of beings and to the local community."
    - title: "Transparency."
      text: "Clear financial management, accountability, and open communication."
    - title: "Sustainability."
      text: "Balance between the growth of the project and the preservation of its spiritual identity."

closing:
  p1: "Dzongpa Europa is sustained thanks to the commitment of its members and donors. Every person who joins contributes to making the teachings of the Dharma and Tibetan culture available to more people, today and in the future."
  cta_text: "Read the history of Dzongpa in Spain →"
  cta_href: "/en/history"

