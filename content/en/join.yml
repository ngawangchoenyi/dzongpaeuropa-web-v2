  title: Join us · Dzongpa Europa
  description: "Become a Friend, Supporter, Protector or Benefactor member and help sustain the teachings, retreats and preservation of the Sakya Dzongpa lineage in Europe."
  slug: join
  active: join
  es_slug: hazte-socio
header:
  title: Become a member
  lede: Together, support the preservation of the lineage
lead: Becoming a member of the Dzongpa Cultural Association is a direct way to support
  the growth of Dzongpa Europa and to help make the teachings of the Dharma available
  to more people.
p2: Members' contributions make it possible to cover basic expenses, organize activities,
  invite masters, rent spaces, translate materials, maintain the website, and create
  a stable fund for future retreats and teachings.
p3: Every contribution, large or small, helps create the conditions for Tibetan culture
  and the Buddhism of the Dzongpa lineage to flourish in our community.
gallery_alts:
- Dzongpa Europa community in Valencia
