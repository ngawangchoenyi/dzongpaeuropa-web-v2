  es_slug: hazte-socio
header:
  title: Devenir membre
  lede: Soutenons ensemble la préservation de la lignée
lead: Devenir membre de l'Association Culturelle Dzongpa est une manière directe de
  soutenir le développement de Dzongpa Europa et de contribuer à rendre les enseignements
  du Dharma disponibles à davantage de personnes.
p2: Les cotisations des membres permettent de couvrir les dépenses de base, d'organiser
  des activités, d'inviter des maîtres, de louer des espaces, de traduire des matériaux,
  de maintenir le site web et de créer un fonds stable pour les futures retraites
  et enseignements.
p3: Chaque contribution, grande ou petite, aide à créer les conditions pour que la
  culture tibétaine et le bouddhisme de la lignée Dzongpa puissent s'épanouir dans
  notre communauté.
