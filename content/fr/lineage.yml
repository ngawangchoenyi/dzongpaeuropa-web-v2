header:
  title: "La lignée Sakya Dzongpa"
  lede: "Tradition, histoire et transmission"

hero_src: "/assets/img/linaje-gongkar/lin-03-gongkar-choede-lhokha-tibet-exterior-hero.jpg"
hero_alt: "Monastère de Gongkar Choede à Lhokha, Tibet, fondé en 1464"

intro:
  lead: "La lignée Dzongpa est une sous-tradition de l'école Sakya du bouddhisme tibétain. Son expression ultérieure, connue sous le nom de Gongkar Dzongpa, fut consolidée au XVe siècle par Dorje Dhenpa Kunga Namgyal, fondateur du monastère de Gongkar Choede en 1464, au Tibet central."
  p2: "Sous la guidance de Son Éminence le VIe Gongkar Dorje Dhenpa Rinpoché, la lignée continue de préserver une riche tradition d'étude, de méditation, de pratique tantrique, de liturgie, d'art sacré et de service au Dharma."

sakya_branch:
  title: "Une branche de la tradition Sakya"
  p1: "La tradition Dzongpa ne constitue pas une école indépendante. Elle appartient à l'école Sakya, l'une des grandes traditions du bouddhisme tibétain, caractérisée par l'intégration de l'étude philosophique, de la méditation et de la pratique tantrique. Au sein de Sakya, Dzongpa conserve une identité propre : une transmission particulière du Lamdré, une tradition monastique historique liée à Gongkar Choede, un corpus textuel distinctif et un programme rituel propre."
  sachen_caption: "Sachen Kunga Nyingpo (1092–1158), premier des Cinq Patriarches fondateurs de l'école Sakya. Peinture murale historique, Gongkar Choede, Lhokha (Tibet)."

origin:
  title: "Origine et histoire"
  p1: "La tradition Dzongpa a ses racines dans la transmission de grands maîtres Sakya, parmi lesquels Lama Dampa Sonam Gyaltsen (1312–1375) et Thegchen Chöje Kunga Tashi. Son expression ultérieure, Gongkar Dzongpa, fut consolidée par Dorje Dhenpa Kunga Namgyal (1432–1496), maître tantrique, érudit et gardien de la tradition Sakya."
  p2: "Selon la tradition, le premier Dorje Dhenpa fut prophétisé par Guru Padmasambhava comme la réincarnation de son disciple Nanam Dorje Dujom, prédit comme un moine nommé Kunga qui apparaîtrait au Tibet central pour éclairer les tantras."

gongkar_choede:
  title: "Gongkar Choede, monastère principal"
  p1: "En 1464, Dorje Dhenpa Kunga Namgyal fonda Gongkar Choede — également connu sous le nom de Gongkar Dorjeden — dans la région de Lhokha, au Tibet central, au sud du fleuve Tsangpo. Le monastère devint le principal centre de la tradition Dzongpa et un lieu éminent pour la pratique du Lamdré, les rituels tantriques, les cycles de mandalas, les enseignements de Hevajra, les protecteurs Sakya et la vie monastique."
  p2: "Ses peintures murales, associées au style Khyenri de la peinture tibétaine, constituent l'une des expressions artistiques les plus remarquables du bouddhisme tibétain du XVe siècle. Ses danses rituelles cham, inspirées des visions mystiques du premier Dorje Dhenpa, font également partie du patrimoine vivant de la lignée."
  khyenri_caption: "Bouddha Shakyamuni en bhumisparsha mudra, peinture murale en style Khyenri. Gongkar Choede, XVe siècle."

dalai_lama:
  title: "Lien avec le Dalaï-Lama"
  p1: "Le Grand Cinquième Dalaï-Lama (1642–1682) nourrissait une profonde admiration pour cette lignée. Il confia à Gongkar Choede la garde du mandala doré tridimensionnel de Kalachakra de son Palais du Potala, dans lequel les moines accomplirent des rituels de Kalachakra pour la paix mondiale pendant de nombreuses générations. Il établit également le Zhol Tsedrub Lhakang, dans le village au pied du Potala, pour que les moines de Gongkar Choede y accomplissent des rituels de Tara Blanche de longue vie et de guérison."
  p2: "De même, le Meru Nyingpa Lhakang, adjacent au Temple de Jokhang à Lhassa, leur fut confié pour accomplir les rituels de protection en l'honneur de leur protecteur patron, Brahmanrupa Mahakala. Depuis lors, les Dorje Dhenpa Rinpochés et les moines Dzongpa de Gongkar Choede ont maintenu une proximité particulière avec chaque Dalaï-Lama."

core_practices:
  title: "Pratiques et enseignements distinctifs"
  intro: "La tradition Sakya Dzongpa conserve un riche corpus de pratiques :"
  practice_list:
    - title: "Le Lamdré."
      text: "« Le Chemin et son Fruit », enseignement central de la tradition Sakya, transmis dans une ligne particulière associée aux maîtres de la lignée Dzongpa."
    - title: "Le cycle de Hevajra."
      text: "Inséparable du Lamdré, avec des représentations du mandala et des pratiques tantriques associées."
    - title: "Les mandalas des quatre classes de tantra."
      text: "Un vaste cycle rituel de mandalas établi par Dorje Dhenpa Kunga Namgyal."
    - title: "Les protecteurs Mahakala."
      text: "Notamment Panjara, Chaturmukha et Brahmanrupa Mahakala, protecteurs propres à la tradition."
    - title: "Vajrakilaya."
      text: "Pratique liée historiquement à la pacification et à la consécration du terrain du monastère."
    - title: "Kalachakra et Tara Blanche."
      text: "Rituels particulièrement importants depuis le lien avec le Cinquième Dalaï-Lama."
    - title: "Les danses cham."
      text: "Liturgie dansée inspirée des visions mystiques du premier Dorje Dhenpa."
  brahmanrupa_caption: "Brahmanrupa Mahakala, protecteur patron de la tradition Dzongpa."

succession:
  title: "Succession et continuité"
  p1: "La succession des Dorje Dhenpa Rinpochés préserve la continuité spirituelle de Gongkar Dzongpa. Le premier Dorje Dhenpa, Dzogchen Kunga Namgyal (1432–1496), fonda Gongkar Choede. Le cinquième Dorjedenpa Tulku, Jampel Lungtok Choekyi Gyaltsen (1928–1959), décéda lors du soulèvement de Lhassa, interrompant la ligne de transmission qu'il soutenait alors."
  p2: "La tradition fut rétablie avec la reconnaissance, en 1989, de l'actuel VIe Gongkar Dorje Dhenpa Rinpoché par Sa Sainteté le Dalaï-Lama, et avec le rétablissement de Gongkar Choede à Dehradun (Inde) en 2003."

preservation:
  title: "Préservation contemporaine"
  p1: "Après les difficultés subies au XXe siècle, la tradition Dzongpa fait l'objet d'un processus de récupération et de préservation qui se poursuit aujourd'hui : rétablissement de la vie monastique en exil, restauration de textes rituels et liturgiques, reprise de l'enseignement du Lamdré et des cycles rituels, et formation de nouvelles générations de pratiquants."
  p2: "Dzongpa Europa s'inscrit dans ce mouvement de préservation, avec la volonté de rendre accessibles en Europe les enseignements, la culture et la pratique de la lignée Sakya Dzongpa."

brahmanrupa_story:
  section_title: "Les origines sacrées du Brahmane Mahakala"
  section_subtitle: "Une histoire du Protecteur Dzongpa"
  statue_photo:
    src: "/assets/img/linaje-gongkar/lin-06-brahman-mahakala-estatua-gongkar-choede.jpg"
    alt: "Statue du Brahmane Mahakala créée par Gongkar Khyentse Chenmo à Gongkar Choede"
    caption: "Statue du Brahmane Mahakala créée par Gongkar Khyentse Chenmo selon la vision de Dorje Dhenpa Kunga Namgyal. Gongkar Choede, Lhokha (Tibet)."
  p1: "Le Premier Dorje Dhenpa, Kunga Namgyal, entretenait une relation particulièrement étroite avec le Mahakala aux quatre visages en tant que son Protecteur du Dharma."
  p2: "Ce Protecteur du Dharma provient de la lignée indienne du Tantra de Guhyasamaja, tel qu'il fut enseigné par Nagarjuna, et fut amené au Tibet sous l'apparence d'un brahmane — un saint homme indien — où il devint l'un des principaux protecteurs de la tradition Sakya à l'époque de Sachen Kunga Nyingpo."
  p3: "Le Protecteur élimina de nombreux obstacles et apporta un grand bénéfice à la tradition Sakya au fil de nombreuses générations. Il apparut déguisé parce que la forme aux quatre visages est la forme intérieure et est considérée comme ésotérique. Sur les autels Sakya, seule la forme extérieure du brahmane est montrée."
  p4: "Quand Dorje Dhenpa Kunga Namgyal était encore très jeune, il vit son Protecteur du Dharma dans une vision pure. Mahakala lui dit :"
  blockquote: "« Je suis ton ami et je travaillerai pour toi. »"
  p5: "Depuis lors, il servit comme son protecteur."
  p6: "Plus tard, après que Dorje Dhenpa Kunga Namgyal fut devenu moine, il effectua un pèlerinage à Sakya et visita un lieu sacré de Mahakala non loin de là, appelé Kau Dragdzong. Là, il accomplit une puja élaborée à Mahakala et put entendre le son d'une trompette en fémur, sans que personne ne la jouât."
  p7: "Il suivit le son et vit son Protecteur du Dharma sous l'apparence d'un brahmane, assis dans une grotte. Lors de cette rencontre, Mahakala offrit la force vitale de son cœur à Dorje Dhenpa Kunga Namgyal, s'engageant à le servir et à l'aider à accomplir ses activités du Dharma de toutes les manières possibles."
  p8: "Après cette expérience, le célèbre disciple artiste de Dorje Dhenpa Kunga Namgyal, Gongkar Khyentse Chenmo, créa une statue de la forme du brahmane exactement telle que son maître l'avait décrite : jouant de la trompette en fémur."
  mural_photo:
    src: "/assets/img/linaje-gongkar/lin-08-mural-primer-dorje-denpa-gongkar-choede.jpg"
    alt: "Ancienne peinture murale du Premier Dorje Dhenpa, Dzogchen Kunga Namgyal, à Gongkar Choede"
    caption: "Peinture murale du Premier Dorje Dhenpa, Dzogchen Kunga Namgyal (1432–1496). Gongkar Choede, Lhokha (Tibet)."
  p9: "Cette forme de représenter le brahmane devint très populaire au Tibet central. Un sanctuaire dédié à cette statue fut établi près du Jokhang, le temple le plus sacré du Tibet, situé dans la capitale, Lhassa. Ce sanctuaire reçut le nom de Meru Nyingpa Lhakhang."
  p10: "Au faîte de la gloire de Gongkar Dorje Den, on disait que les offrandes faites à la statue dans ce Lhakhang suffisaient à subvenir aux besoins matériels de toute la Sangha de Gongkar Dorje Den, qui comptait près de trois mille moines."
  p11: "Cela était dû à la grande foi que les gens avaient en cette pure lignée de pujas à Mahakala pour la protection et le dépassement des obstacles. Non seulement les Tibétains : des marchands chinois Han et Ouïghours qui visitaient le lieu ont également fait des offrandes au sanctuaire pendant des siècles, et celui-ci existe encore de nos jours."
  p12: "Heureusement pour la communauté Dzongpa, les pujas et prières de Dorje Dhenpa Kunga Namgyal à Mahakala se poursuivent grâce à S. Em. Gongkar Dorje Dhenpa Rinpoché, qui les accomplit avec bienveillance de manière régulière pour nous tous."
  altar_photo:
    src: "/assets/img/linaje-gongkar/lin-07-altar-gongkar-choede-v-dorjedenpa-retrato.jpg"
    alt: "Autel de Gongkar Choede avec portrait du Ve Dorjedenpa Tulku"
    caption: "Autel intérieur de Gongkar Choede, avec le portrait du Ve Dorjedenpa Tulku, Jampel Lungtok Choekyi Gyaltsen (1928–1959)."
  attribution_text: "Texte de : Vénérable Kassapo"
  attribution_photos: "Photos et vidéos de : Kunga Zhoennu"
