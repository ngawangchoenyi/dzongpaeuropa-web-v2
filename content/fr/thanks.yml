header:
  title: Merci infiniment !
  lede: Votre générosité permet aux enseignements de continuer
body:
  p1: Votre don a bien été reçu. Votre soutien contribue directement à préserver
    et à partager les enseignements de la lignée Dzongpa en Europe.
  p2: Vous recevrez bientôt un e-mail de confirmation de Stripe avec le récapitulatif
    de votre don. Si vous avez besoin d'un reçu fiscal, écrivez-nous à
    <a href="mailto:secretaria@dzongpaeuropa.org">secretaria@dzongpaeuropa.org</a>
    en indiquant votre nom complet et votre adresse postale.
newsletter_title: Restez informé
