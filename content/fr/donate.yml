patrimony_title: Dons non monétaires et patrimoniaux
patrimony_p: L'association peut également recevoir des dons non monétaires ou patrimoniaux
  — biens mobiliers, immobiliers, bibliothèque, objets de pratique — à condition qu'ils
  soient alignés avec ses objectifs culturels et spirituels. Si vous souhaitez faire
  une contribution de ce type, écrivez-nous à <a href="mailto:secretaria@dzongpaeuropa.org">secretaria@dzongpaeuropa.org</a>.
