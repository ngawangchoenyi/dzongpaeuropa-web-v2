header:
  title: Dons
  lede: Une contribution pour que les enseignements s'épanouissent
lead: Les dons aident à soutenir les activités de Dzongpa Europa et à créer les conditions
  nécessaires pour préserver et partager les enseignements de la lignée Dzongpa.
p2: Les contributions peuvent être destinées à l'organisation d'enseignements et de
  retraites, aux visites de maîtres, à la traduction de textes, à la location d'espaces,
  à la maintenance du site web, à la communication, aux matériaux de pratique et à
  la création d'un fonds stable pour l'association.
purpose_title: Destination des dons
purpose_items:
- Invitation de maîtres de la lignée et organisation de retraites.
- Enseignements en présentiel et en ligne.
- Traduction de textes du Dharma en espagnol, anglais et chinois.
- Location d'espaces pour retraites et enseignements.
- Matériaux de pratique et bibliothèque.
- Site web, communication et bulletin.
- Fonds stable de l'association.
- Soutien à d'autres projets culturels et spirituels de la lignée.
