  title: "宗巴在西班牙的历史 · Dzongpa Europa"
  description: "从德拉敦到瓦伦西亚：萨迦宗巴传承在西班牙的历史，从2012年首次教法到协会成立及萨迦赤津的加持。"
  slug: history
  active: history
  es_slug: historia

header:
  title: "宗巴在西班牙的历史"
  lede: "从德拉敦到瓦伦西亚，从瓦伦西亚到欧洲"

hero:
  src: "/assets/img/juventud-rinpoche/juv-05-rinpoche-retrato-v-dorjedenpa-tulku.jpg"
  alt: "尊贵的贡噶多杰丹巴仁波切手持前任多杰丹巴 Jampal Lungthok 的法像"
  caption: "尊贵的贡噶多杰丹巴仁波切手持前任多杰丹巴 Jampal Lungthok 的法像。"

lead: "萨迦宗巴传承在西班牙的存在，拥有比其现有法律形式所能显示的更长历史。其根源可以追溯到印度德拉敦的一次相遇，并由此随着时间的推移，孕育了一个修行社区、一个协会，以及今日的 Dzongpa Europa 项目。"

origin:
  title: "起源：德拉敦与 Kunga Tsondru 的相遇"
  p1: "Dzongpa 在西班牙的起源，可以追溯到尊贵的贡噶多杰丹巴仁波切与 Kunga Tsondru ——José Manuel Sánchez—— 于1993年秋天在印度德拉敦萨迦学院的相遇。由那次相遇，产生了一份友谊与精神联系，并在后来促成了邀请仁波切到西班牙传法的最初因缘。"
  photos:
    - src: "/assets/img/india/ind-01-rinpoche-sakya-college-dehradun.jpg"
      alt: "仁波切在德拉敦萨迦学院，印度"
      caption: "尊贵的贡噶多杰丹巴仁波切在萨迦学院，德拉敦。1995年。"
    - src: "/assets/img/india/ind-02-sakya-college-con-monjes-dehradun.jpg"
      alt: "仁波切与僧侣在德拉敦萨迦学院"
      caption: "尊贵的贡噶多杰丹巴仁波切与僧侣在萨迦学院，德拉敦。1998年。"

ensenanzas_2012:
  title: "在西班牙的首次教法 · 2012年"
  p1: "2012年，尊贵的贡噶多杰丹巴仁波切在阿利坎特省佩德雷格尔的萨迦基金会给予教法，由尊者 Khyentse-la 陪同，并处于至圣第四十一任萨迦赤津的精神加持之下。那些由一群西班牙修行者所领受的教法，播下了多年后成为稳定社区的种子。"
  photos:
    - src: "/assets/img/espana/esp-02-ensenanzas-pedreguer-rinpoche-khyentse-la.jpg"
      alt: "2012年佩德雷格尔教法——仁波切与 Khyentse-la"
      caption: "尊贵的贡噶多杰丹巴仁波切与尊者 Khyentse-la。佩德雷格尔，2012年。"
    - src: "/assets/img/espana/esp-01-grupo-pedreguer-2012.jpg"
      alt: "2012年佩德雷格尔修行者群像"
      caption: "修行者群像。佩德雷格尔，2012年。"

tara_2017:
  title: "白昼寂静度母与夜间忿怒度母 · 2017年"
  p1: "2017年9月，尊贵的贡噶多杰丹巴仁波切首次在西班牙阿利坎特省佩德雷格尔的萨迦佛教中心（Paramita）传授白昼寂静度母与夜间忿怒度母的教法和灌顶——这是属于萨迦宗巴传承的一项深具内涵的密续修法。"
  p2: "这一修法将度母的寂静与忿怒两面整合于单一传承循环之中，在传承内部因其护法威力及消除修行道上障碍的能力而备受珍视。"
  photos:
    - src: "/assets/img/espana/esp-12-rinpoche-tara-paramita-2017.jpg"
      alt: "尊贵的贡噶多杰丹巴仁波切在2017年Paramita佩德雷格尔给予教法"
      caption: "尊贵的贡噶多杰丹巴仁波切在教法期间。Paramita，佩德雷格尔，2017年。"
    - src: "/assets/img/espana/esp-13-rinpoche-ritual-paramita-2017.jpg"
      alt: "尊贵的贡噶多杰丹巴仁波切在灌顶期间的坛城前。Paramita，2017年"
      caption: "尊贵的贡噶多杰丹巴仁波切在灌顶期间的坛城前。Paramita，2017年。"
    - src: "/assets/img/espana/esp-14-ensenanzas-sala-paramita-2017.jpg"
      alt: "教法期间法堂内景。Paramita，佩德雷格尔，2017年"
      caption: "教法期间法堂内景。Paramita，2017年。"
    - src: "/assets/img/espana/esp-15-grupo-paramita-2017.jpg"
      alt: "2017年9月佩德雷格尔萨迦佛教中心修行者群像"
      caption: "修行者群像。佩德雷格尔萨迦佛教中心，2017年9月。"

valencia_2019:
  title: "瓦伦西亚 · 2019年"
  p1: "2019年9月，仁波切访问瓦伦西亚，在 Lama Sangdü 法循环内给予了上师如意宝完整坛城阿底瑜伽灌顶。在那次访问中，仁波切表达了希望在瓦伦西亚市建立宗巴中心的愿望，作为修行、学习和传承保存的场所。"
  photo_main:
    src: "/assets/img/espana/esp-06-rinpoche-valencia-2019.jpg"
    alt: "仁波切在瓦伦西亚给予教法，2019年9月"
    caption: "尊贵的贡噶多杰丹巴仁波切在瓦伦西亚，2019年9月。"
  photos_right:
    - src: "/assets/img/espana/esp-07-grupo-valencia-2019.jpg"
      alt: "2019年瓦伦西亚教法期间修行者群像"
      caption: "修行者群像。瓦伦西亚，2019年。"
    - src: "/assets/img/espana/esp-10-valencia-2019-c.jpg"
      alt: "灌顶期间。瓦伦西亚，2019年。"
      caption: "灌顶期间。瓦伦西亚，2019年。"

grupo_practica:
  title: "修行团体的形成"
  p1: "从仁波切所表达的愿望出发，2020年开始巩固一个与宗巴传承相连的修行团体。该团体逐渐创造了支持定期活动、接受教法并为稳定项目塑形所需的人文、精神和组织条件。"

constitucion:
  title: "Dzongpa 文化协会的成立"
  p1: "2022年，这一进程以 Dzongpa 文化协会的正式登记而具体化，协会以编号 <strong>CV-01-062727-V</strong>（第一部分）登记于瓦伦西亚社区协会登记册，总部设在瓦伦西亚。"

bendiciones:
  title: "至圣第四十一任与第四十二任萨迦赤津的加持"
  p1: "2022年，David Sanz 与其妻 Rosi 代表 Dzongpa 文化协会前往瑞士，在那里获得了至圣第四十二任萨迦赤津对瓦伦西亚宗巴中心项目的加持。至圣第四十一任萨迦赤津也在场。"
  p2: "在那次相遇中，至圣第四十二任萨迦赤津指示 David 和 Rosi 前往 Paramita（旧萨迦基金会），即在 La Sella，佩德雷格尔，两位萨迦赤津将在那年于此给予教法，以便更详细地讨论瓦伦西亚宗巴中心项目。"
  p3: "随后，在 Paramita 的一次私人会面中，至圣第四十一任萨迦赤津为瓦伦西亚宗巴中心赐予了加持。作为吉祥的手势，他赠予了一幅释迦牟尼佛唐卡，并表达了希望创造必要条件使贡噶多杰丹巴仁波切能够传授教法的愿望。"
  p4: ""
  photos_left:
    - src: "/assets/img/espana/esp-08-ss41-sakya-trizin-suiza-2022.jpg"
      alt: "至圣 Gongma Trichen 仁波切。瑞士，2022年"
      caption: "至圣第四十一任萨迦赤津：Gongma Trichen 仁波切。瑞士，2022年。"
    - src: "/assets/img/espana/esp-11-suiza-2022-c.jpg"
      alt: "至圣 Gongma Trichen 仁波切与至圣第四十二任萨迦赤津与团体合影。瑞士，2022年。"
      caption: "第41任与第42任萨迦赤津与团体合影。瑞士，2022年。"
  photo_right:
    src: "/assets/img/espana/esp-09-rinpoche-david-suiza-2022.jpg"
    alt: "仁波切与 David Sanz 在瑞士，2022年"
    caption: "第42任萨迦赤津与协会主席 David Sanz。瑞士，2022年。"

desarrollo:
  title: "仍在发展中的历史"
  p1: "从那时起，Dzongpa Europa 继续致力于在瓦伦西亚巩固修行社区，并在西班牙和欧洲开辟相遇空间。协会保持着保存萨迦宗巴传承、支持仁波切活动、为有兴趣的人提供对佛法教义的尊重而有活力的接触的愿望。"
  p2: "今天，这段历程投射到一个新阶段：<strong>Dzongpa Europa</strong>，一个旨在在整个欧洲有兴趣的人与萨迦宗巴传统之间建立桥梁的倡议，是传承国际网络的一部分。"
  photo:
    src: "/assets/img/espana/esp-16-rinpoche-sonriendo-paramita-2017.jpg"
    alt: "尊贵的贡噶多杰丹巴仁波切在2017年Paramita教法期间微笑"

quotes:
  - text: "&ldquo;由于菩提心决定我们的修行是否成为觉悟之道，菩提心确实是一切佛陀教法的核心精髓。&rdquo;"
    cite: "— 达赖喇嘛"
  - text: "&ldquo;当修行成为你每天的习惯，它就不再困难了。&rdquo;"
    cite: "— 尊贵的贡噶多杰丹巴仁波切"

timeline:
  title: "大事年表"
  items:
    - year: "1993年秋 · 德拉敦，印度"
      text: "尊贵的贡噶多杰丹巴仁波切与 Kunga Tsondru 在德拉敦萨迦学院相遇。邀请仁波切到西班牙传法的最初因缘由此而生。"
    - year: "2012年 · 佩德雷格尔（阿利坎特）"
      text: "仁波切在佩德雷格尔萨迦基金会给予西班牙的首次教法，由尊者 Khyentse-la 陪同，在至圣第四十一任萨迦赤津的精神加持下进行。"
    - year: "2017年9月 · 佩德雷格尔（阿利坎特）"
      text: "尊贵的贡噶多杰丹巴仁波切首次在西班牙传授白昼寂静度母与夜间忿怒度母的教法和灌顶，在佩德雷格尔萨迦佛教中心。"
    - year: "2019年9月 · 瓦伦西亚"
      text: "仁波切访问瓦伦西亚并给予阿底瑜伽灌顶。表达了在瓦伦西亚建立宗巴中心的愿望。"
    - year: "2020年 · 修行团体的形成"
      text: "开始巩固与宗巴传承相连的修行团体，逐渐为定期活动创造精神和组织条件。"
    - year: "2022年1月14日 · 瓦伦西亚"
      text: "Dzongpa 文化协会正式成立，以编号 CV-01-062727-V 登记于瓦伦西亚社区协会登记册。"
    - year: "2022年 · 瑞士"
      text: "David Sanz 与 Rosi 获得至圣第四十二任萨迦赤津对瓦伦西亚宗巴中心项目的加持，至圣第四十一任萨迦赤津亦在场。"
    - year: "2022年 · Paramita，佩德雷格尔"
      text: "在 Paramita 与至圣第四十一任萨迦赤津私人会面：为中心赐予加持，并赠予释迦牟尼佛唐卡。"
    - year: "2026年2月 · 瓦伦西亚"
      text: "在瓦伦西亚举行教法和灌顶系列。仁波切在 Dzongpa Europa 框架内的首次正式访问。"
    - year: "2026年 · 欧洲"
      text: "Dzongpa Europa 启动：项目扩展至整个欧洲大陆，作为萨迦宗巴传承国际网络的一部分。"

