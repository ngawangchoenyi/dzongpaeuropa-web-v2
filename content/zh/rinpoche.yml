header:
  title: 尊贵的第六世贡噶多杰丹巴仁波切
  lede: 丹增蒋巴隆托南嘉 · 萨迦宗巴传承最高上师
hero_alt: 尊贵的第六世贡噶多杰丹巴仁波切在法座上
lead: 尊贵的第六世贡噶多杰丹巴仁波切——丹增蒋巴隆托南嘉——是藏传佛教萨迦宗巴传承的最高上师。他于1977年生于印度东北部阿鲁纳恰尔邦，靠近西藏边境。他的生命与教法致力于保存宗巴传统，以及利益一切众生。
tulku:
  title: 被认定为祖古
  p1: 他的前任——第五位多杰丹巴祖古——于1959年拉萨起义期间过早圆寂。宗巴传承的僧侣们多次向达赖喇嘛尊者询问他们的上师是否已转世。经过仔细审查，尊者指示他们将寻访方向转向印度东北部，靠近西藏边境之处。
  p2: 1989年，仁波切在阿鲁纳恰尔邦被找到，并由达赖喇嘛尊者认定，尊者为他举行了剃度仪式并赐名丹增蒋巴隆托。随后，已故的确吉崔钦仁波切将其名扩展为丹增蒋巴隆托南嘉。
  dal02_caption: 第十四世达赖喇嘛尊者于1989年正式认定仁波切为第五位多杰丹巴祖古的转世。
training:
  title: 修学历程
  p1: 达赖喇嘛尊者强调仁波切接受深入全面培训的重要性。为此，他作为年龄最小的学生进入德拉敦萨迦学院，在已故肯波米玛次仁的指导下，于1999年以优异成绩毕业。
  p2: 除了精通那烂陀传统十三部大论（如萨迦传统所授），仁波切还从至圣第四十一任萨迦赤津和其他传承大上师处领受了密续总集、修法总集、完整道果法，以及众多密续灌顶、传授与口诀。
gongkar:
  title: 重建贡噶确德寺
  p1: 2003年，仁波切在印度德拉敦重建了贡噶确德寺，使这一传承主寺在流亡地得以延续——该寺最初建于1464年西藏。寺院由达赖喇嘛尊者主持开光，同一典礼上仁波切由至圣第四十一任萨迦赤津坐床，成为传承首席上师。
  p2: 在寺院中，仁波切进行了多次禅修闭关，精通了传承的密续仪轨，并完全承担起保护传承的责任。
  dal03_caption: 两位祝福仁波切修行之路的最高精神权威。
international:
  title: 国际弘法活动
  p1: 自2005年以来，仁波切在世界各地进行国际弘法之旅。他在台北建立了萨迦宗巴金刚乘社区，在那里定期给予教法；此后，与传承相连的修行社区已在印度、台湾、英国、西班牙、澳大利亚和香港相继形成。
  p2: 应其家乡阿鲁纳恰尔邦当地佛教徒的请求，仁波切已着手在当地建立贡嘎多吉殿（Gongkar Dorje Den）项目，以此作为更大的基地，使宗巴传统得以完整复兴。
europa:
  title: 对 Dzongpa Europa 的指导
  p1: Dzongpa 文化协会和 Dzongpa Europa 项目在仁波切的鼓励与精神指导下发展，希望创造适当的条件，使他的教法和宗巴传承的教法能够在欧洲被领受、学习和修习。
