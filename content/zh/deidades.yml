  title: "修法与本尊 · 龙巴欧洲"
  description: "龙巴传承修法与本尊的介绍性指南，附传统背景与编辑说明。"
  slug: "deities"
  active: "activities"
  robots: "index, follow"
header:
  title: "龙巴传承修法与本尊"
  lede: "通俗易懂的指南，帮助了解龙巴传承各项修法与法事的传统意义。"
intro: "本目录汇集了与萨迦龙巴传承相关的修法和本尊的公开说明，旨在为参与龙巴欧洲活动的人士提供文化、历史和信仰背景。"
nota_contexto: "有关护佑、障碍、长寿、净化或财富的传统表述，均在其宗教与象征框架内呈现，不构成医疗、心理或经济承诺，亦不能替代专业指导。"
nota_restringidas: "部分修法需要具备资格的上师传授、授权或具体指导。若某修法被标注为限制性修法，则仅提供背景信息。"
labels:
  beneficios: "相关传统功德利益"
  aliases: "又称"
  relacionadas: "相关修法"
  restringida: "限制性修法"
  ver_mas: "查看说明"
deidades:
  -
    id: "ganapati-blanco-dzongpa"
    orden: 1
    nombre: "龙巴白象鼻财神"
    subtitulo: "殊胜的资粮、福德与顺缘修法"
    descripcion_corta: "龙巴白象鼻财神在传统中被视为一种殊胜修法，与福德、财富及修行顺缘的增长密切相关。"
    descripcion_larga:
      - "在萨迦龙巴传承中，白象鼻财神被视为与消除障碍、聚集顺缘相关的本尊。修习此法不应单纯从物质层面理解，而应视为调和内外因缘、令精神生活得以稳固发展的方式。传统上，此修法与福德积累、资源改善、吉祥好运以及推进利他事业的能力相关联。"
    beneficios:
      - "助力积累福德与智慧。"
      - "帮助聚集修行与弘法事业的顺缘。"
      - "消除与匮乏、资源不足或不稳定相关的障碍。"
      - "支持以利益众生为目标的个人或团体项目。"
  -
    id: "ganapati-rojo"
    orden: 2
    nombre: "红象鼻财神"
    subtitulo: "磁摄、吉祥与强大事业之能量"
    descripcion_corta: "红象鼻财神可被理解为强大磁摄活动的体现，与消除障碍、聚集成功与圆满的因缘相关。"
    descripcion_larga:
      - "在龙巴活动的语境中，红象鼻财神可简单解释为以转化障碍、聚集吉祥能量为目的的修法。在金刚乘佛教中，红色形相通常与磁摄事业相关：吸引顺缘、调和关系、为利他目的聚集资源。对于普通大众而言，可将其理解为一种帮助建立连结、增强动力、在生活与修行中形成积极方向的修法。"
    beneficios:
      - "吸引利于善业的顺缘。"
      - "将障碍转化为积极动力。"
      - "促进连结、和谐与项目的持续发展。"
      - "支持弘法事业与团体福祉。"
  -
    id: "vajradaka-fire-puja"
    orden: 3
    nombre: "金刚火天火供"
    subtitulo: "净化与转化障碍的火供修法"
    descripcion_corta: "金刚火天火供被视为深度净化的修法，与消除负面业障及内外障碍密切相关。"
    descripcion_larga:
      - "金刚火天火供在龙巴传承的仪轨活动中占有重要地位。据传承所载，龙巴传承的创始人、第一世尊者贡卡南嘉每日修持金刚火天。火供修法象征着转化：遮蔽心性、扰乱内心平静或阻碍修道的一切，皆以智慧之火净化。对于普通大众而言，可解释为一种象征净化负面习气、消除情绪障碍与逆缘的仪式，为内心平静、明晰与修行进步开辟空间。"
    beneficios:
      - "净化负业及扰乱心性的习气。"
      - "消除内外障碍。"
      - "促进心灵平静、安宁与修行的持续。"
      - "与传承其他修法配合修持时，增长福德与智慧。"
  -
    id: "brahmanrupa-mahakala"
    orden: 4
    nombre: "婆罗门相大黑天"
    subtitulo: "龙巴传承的护法与特殊护佑"
    descripcion_corta: "婆罗门相大黑天是与传承护佑、消除障碍及恢复吉祥因缘相关的护法本尊。"
    descripcion_larga:
      - "婆罗门相大黑天是与大黑天相关的护法形相，在龙巴传承中占有特别重要的地位。据载，他与贡卡多杰登巴仁波切历代化身及传承弟子之间保有一种殊胜的神圣连结。其传统功能是护持正法、遣除障碍、支持修行，并促进加持迅速成熟。护法修行并非基于恐惧，而是对护持功德、明晰与精神承诺的觉醒功德的信任。"
    beneficios:
      - "消散障碍与困难。"
      - "护持修行、传承与团体。"
      - "依传统，招引吉祥因缘与好运。"
      - "与供施荟供配合修持时，助力恢复精神誓愿。"
  -
    id: "tsog-offering"
    orden: 5
    nombre: "荟供"
    subtitulo: "聚集供养、福德与恢复三昧耶"
    descripcion_corta: "荟供是一种金刚乘供养仪式，汇聚大众共同积累福德、恢复誓愿，并更新与上师、传承及修行的连结。"
    descripcion_larga:
      - "荟供是一种聚集与精神恢复的修法。在金刚乘中，被理解为积累福德与智慧、净化过失、恢复三昧耶或精神誓愿、加强与上师及传承之联结的方式。对于普通大众而言，可描述为一种供养与内心和解的仪式，大众以恭敬、感恩与利益一切众生的愿心共同参与。"
    beneficios:
      - "积累福德与智慧。"
      - "恢复受损的精神誓愿。"
      - "加强与上师、传承及团体的关系。"
      - "将供养转化为慷慨与净化的修法。"
  -
    id: "palden-lhamo"
    orden: 6
    nombre: "班丹拉母 / 帝努玛 / 大黑天母"
    subtitulo: "智慧与迅速事业的女性护法"
    descripcion_corta: "班丹拉母，在某些法会通知中亦以帝努玛或大黑天母之名出现，是与智慧、迅速护佑及消除障碍相关的女性护法。"
    descripcion_larga:
      - "班丹拉母是藏传佛教中极为重要的女性护法。在龙巴资料中，她被呈现为护持智慧的强大显现，能够迅速回应、援助身陷困境的众生。她的能量体现为积极护佑：消散障碍、斩断逆缘、支持修行与利他善业。她象征智慧悲心在护持正法、助力行者克服艰难处境时所展现的力量。"
    beneficios:
      - "消除障碍与逆缘。"
      - "护持修行与弘法事业。"
      - "促进平静、稳定与和谐进步。"
      - "与火供配合修持时，增长福德与智慧。"
  -
    id: "buda-akshobhya"
    orden: 7
    nombre: "不动佛"
    subtitulo: "深度净化与转化负业"
    descripcion_corta: "不动佛与深度净化相关，尤其是净化严重负行及导致苦难状态的习气。"
    descripcion_larga:
      - "不动佛代表不动摇的心——清明而无扰动。在所提及的龙巴修法中，其在艰难时期的净化力量尤为突出。此修法与净化负行、消除有害习气以及利益亡者相关，依佛教传统助其避免投生恶道。对于普通大众而言，可解释为一种与自身过去和解、将负面转化为明晰的修法。"
    beneficios:
      - "净化负业与有害习气。"
      - "通过诵经与回向利益亡者。"
      - "疗愈与过去负面行为或言语的关系。"
      - "促进心性更加稳定、清明与不动摇。"
  -
    id: "chenrezig"
    orden: 8
    nombre: "观世音菩萨（四臂）"
    subtitulo: "大悲佛"
    descripcion_corta: "四臂观世音菩萨体现一切诸佛无量悲心，以及解脱一切众生于苦难的大愿。"
    descripcion_larga:
      - "观世音菩萨是藏传佛教中最受喜爱的形象之一，代表普世悲心：聆听众生苦难并以慈悲、智慧与临在回应的能力。在龙巴活动中，既作为一般加持修法出现，也用于回向亡者、先祖及受苦众生。对于普通大众，可将其呈现为一种培育悲心、内心平静及利益生者与亡者之愿的修法。"
    beneficios:
      - "培养悲心、感受力与善意。"
      - "将福德回向家人、先祖与亡者。"
      - "促进平静与精神和谐。"
      - "以悲悯与利益的方向陪伴哀伤历程。"
  -
    id: "tara-verde"
    orden: 9
    nombre: "绿度母"
    subtitulo: "觉悟事业、护佑与悲心回应"
    descripcion_corta: "绿度母体现诸佛的觉悟事业，与迅速消除障碍及对众生需求的悲心回应密切相关。"
    descripcion_larga:
      - "绿度母是藏传佛教中最广为人知且深受喜爱的女性显现之一，代表觉悟事业：一种不停留于被动，而是迅速行动以缓解苦难的悲心。在龙巴语境中，她被呈现为在艰难时期尤为适合的修法，当人们需要资源、护佑与福德来支撑日常生活与修行时。绿度母是护佑、希望与悲心行动的临在。"
    beneficios:
      - "消除内外障碍。"
      - "回应众生的需求与愿望。"
      - "促进护佑、资源与修行的顺缘。"
      - "激发信心、开放心态与悲心行动。"
  -
    id: "tara-blanca"
    orden: 10
    nombre: "白度母"
    subtitulo: "长寿、护佑与正法的延续"
    descripcion_corta: "白度母在传统上与长寿、健康、护佑和福德增长，以及正法活动的延续相关。"
    descripcion_larga:
      - "白度母在传统中被呈现为三世诸佛之母，是长寿加持的源泉。在龙巴语境中，此修法曾被特别持修，以祈愿正法活动的长久延续。对于普通大众，可解释为深度关怀的修法：关怀生命、健康、内在稳定，以及利益众生之一切事业的持续。"
    beneficios:
      - "促进长寿、健康与护佑。"
      - "减轻障碍、灾难与逆缘。"
      - "增长福德与正面品质。"
      - "支持正法事业在世间的延续。"
  -
    id: "vasudhara-roja"
    orden: 11
    nombre: "红财续母 / 玛波诺钦玛"
    subtitulo: "以利他为目的的财富、福德与丰盛女神"
    descripcion_corta: "红财续母，又称玛波诺钦玛，是一种殊胜的财富与福德修法，以聚集资源与顺缘来支持修道为目的。"
    descripcion_larga:
      - "红财续母，在资料中以玛波诺钦玛呈现，传统上与财富、好运和福德的增长相关。从佛教角度看，财富不仅仅被理解为物质积累，而是可供有尊严地生活、修习佛法、利益他人的资源的可及性。此修法可向大众解释为培养慷慨、克服匮乏、为修行与团体服务而创造丰盛条件的方式。"
    beneficios:
      - "增长福德、繁荣与资源。"
      - "帮助克服与匮乏或缺乏支持相关的障碍。"
      - "促进世间与精神项目的圆满。"
      - "提醒丰盛应以利益与慷慨为导向。"
  -
    id: "vajrapani"
    orden: 12
    nombre: "金刚手菩萨"
    subtitulo: "觉悟力量、精神之力与障碍的超越"
    descripcion_corta: "金刚手菩萨代表诸佛的觉悟力量，与克服障碍、疾病、冲突和情绪困难的力量相关。"
    descripcion_larga:
      - "金刚手菩萨体现觉悟的强大能量：护持智慧、令人在不失明晰的情况下面对障碍的力量。在龙巴资料中，其功德在健康、关系、事业、情绪、财富、长寿与福德方面均有描述。其修法能唤醒勇气、稳定与精神能量，将困难转化为修道助缘。"
    beneficios:
      - "克服与健康、情绪和关系相关的障碍。"
      - "增强活力、信心与行动力。"
      - "支持长寿、福德与智慧。"
      - "帮助为修道汇聚资源。"
  -
    id: "buda-medicina"
    orden: 13
    nombre: "药师佛"
    subtitulo: "疗愈、减轻苦难与利益愿心"
    descripcion_corta: "药师佛是精神疗愈的象征，与减轻苦难、治愈疾病和实现利益愿心相关。"
    descripcion_larga:
      - "药师佛代表觉悟的疗愈维度，其誓愿以减轻众生身、心、灵苦难为目标。在龙巴修法语境中，与其他护法本尊及火供配合，以净化障碍、增长福德、为身心带来平静。对于普通大众，可解释为整合性疗愈的修法，将悲心、智慧与对自身及他人健康的回向融为一体。"
    beneficios:
      - "减轻苦难与健康相关的障碍。"
      - "促进身心平静。"
      - "增长福德与智慧。"
      - "将积极能量回向患者、照护者和身处困境的人。"
  -
    id: "dhvajagrakeyura"
    orden: 14
    nombre: "幢顶臂钏 / Dhvajagrakeyira"
    subtitulo: "护佑、战胜障碍与吉祥因缘"
    descripcion_corta: "幢顶臂钏被呈现为帮助克服冲突、障碍与逆缘的护佑修法。"
    descripcion_larga:
      - "幢顶臂钏在资料中作为护佑修法出现，陪伴佛陀弟子于艰难处境中。与内外护佑、战胜敌障以及生起清净吉祥因缘相关。对于普通大众，此修法不宜解释为外部对抗，而应理解为在面对冲突、纠纷或困难时维护明晰、尊严与精神护佑的支撑。"
    beneficios:
      - "护佑免受内外障碍侵扰。"
      - "促进冲突与逆缘的化解。"
      - "为修行生起吉祥因缘。"
      - "在艰难处境中增强信心与稳定。"
  -
    id: "garuda"
    orden: 15
    nombre: "大鹏金翅鸟"
    subtitulo: "净化疾病、非人障碍与五大调和"
    descripcion_corta: "大鹏金翅鸟在传统上与消除疾病、有害能量及与五大失衡相关的障碍密切相关。"
    descripcion_larga:
      - "大鹏金翅鸟是与护佑和疗愈相关的强大形象。龙巴资料中提及其处理与非人因缘相关的流行病、疫情及疾病的能力，以及调和五大的功能。以通俗语言可描述为护佑与平衡的修法，致力于平息扰乱性因缘、增强生命力、支持修行者的精神与能量健康。"
    beneficios:
      - "平息疾病、流行病与干扰。"
      - "调和五大元素。"
      - "依传统，消除非人障碍或有害能量。"
      - "护持修行，将负业转化为顺缘。"
  -
    id: "zambala-negro"
    orden: 16
    nombre: "黑财神"
    subtitulo: "服务于正法的财富、护佑与资源"
    descripcion_corta: "黑财神是与资源增长、护佑、好运及修行的物质顺缘相关的财神。"
    descripcion_larga:
      - "黑财神传统上与财富、慷慨及对抗物质障碍的护佑相关。在资料中，他与水供及不动佛加持并列，显示净化、繁荣与护佑之间的关联。对于普通大众，应解释佛法中的财富不仅限于金钱：还包括资源、稳定、机遇、健康、慷慨以及支持利他活动的能力。"
    beneficios:
      - "增长财富与资源。"
      - "护佑免受障碍、盗贼和恐惧条件的侵扰。"
      - "促进长寿、好运与愿望的实现。"
      - "将资源导向慷慨与利益众生。"
  -
    id: "yogu-three-sisters"
    orden: 17
    nombre: "约古三姐妹 / 财富三姐妹"
    subtitulo: "生计、家庭安康与五大均衡"
    descripcion_corta: "财富三姐妹与食物、衣物、资源及身心安康相关，亦与五大失衡的平息有关。"
    descripcion_larga:
      - "约古三姐妹，即财富三姐妹，在资料中作为与基本生计相关的本尊出现：食物、衣物与资源。其深层意义可解释为对普通生活条件的关怀——这些条件使人得以稳定生活、修习佛法。她们亦与身心安康及五大失衡的平息相关。她们的修法聚焦于对家庭、家宅、适度丰足与和谐生态的护佑。"
    beneficios:
      - "确保生计、食物与资源的充足。"
      - "促进身心安康。"
      - "平息五大失衡。"
      - "支持家庭稳定与精神修行。"
  -
    id: "madre-planetas"
    orden: 18
    nombre: "九曜母"
    subtitulo: "护佑免受星宿影响与逆缘侵扰"
    descripcion_corta: "九曜母是以护佑免受星宿干扰、避免灾祸、促进长寿、稳定与实现善愿为目的的修法。"
    descripcion_larga:
