patrimony_title: 非货币及资产捐赠
patrimony_p: 协会也可接受非货币或资产捐赠——动产、不动产、图书馆、修行物品——前提是与其文化和精神宗旨一致。如有意向，请发送电子邮件至 <a href="mailto:secretaria@dzongpaeuropa.org">secretaria@dzongpaeuropa.org</a>。
tax_title: 税务方面
tax_p: Dzongpa 文化协会以编号 <strong>CV-01-062727-V</strong>（第一部分）登记于瓦伦西亚社区协会登记册。作为非营利实体，我们开具年度捐款证明。为此，我们需要您的全名和通讯地址。
