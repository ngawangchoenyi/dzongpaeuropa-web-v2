header:
  title: 捐款
  lede: 一份让教法得以绽放的贡献
lead: 捐款有助于支持 Dzongpa Europa 的活动，并创造保存和分享宗巴传承教法所需的条件。
p2: 捐款可用于组织教法和闭关、上师访问、文本翻译、场地租用、网站维护、传播、修行材料，以及为协会建立稳定基金。
purpose_title: 捐款用途
purpose_items:
- 邀请传承上师并组织闭关。
- 线下和线上教法。
- 将佛法文本翻译成西班牙语、英语和中文。
- 为闭关和教法租用场地。
- 修行材料和图书馆。
- 网站、传播和通讯。
- 协会稳定基金。
- 支持传承其他文化和精神项目。
stripe_title: 刷卡捐款
stripe_subtitle: 一次性或定期信用卡/借记卡付款。Stripe 安全平台。
stripe_other_btn: 其他金额
stripe_secure_text: 您将被重定向到 Stripe 安全支付网关。我们接受 Visa、Mastercard 和 American Express。
