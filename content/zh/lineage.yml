header:
  title: 萨迦宗巴传承
  lede: 传统、历史与传续
hero_src: /assets/img/linaje-gongkar/lin-03-gongkar-choede-lhokha-tibet-exterior-hero.jpg
hero_alt: 位于西藏拉孜地区的贡噶确德寺，建于1464年
intro:
  lead: 宗巴传承是藏传佛教萨迦派的一个支系传统。其后来形式——贡噶宗巴——由多杰丹巴昆嘉南嘉于十五世纪奠定，他于1464年在西藏中部创建了贡噶确德寺。
  p2: 在尊贵的第六世贡噶多杰丹巴仁波切的指导下，传承继续保存着丰富的学习、禅修、密续修法、仪轨、神圣艺术和佛法服务传统。
sakya_branch:
  title: 萨迦传统的一个支脉
  p1: 宗巴传统并非独立宗派。它属于萨迦派——藏传佛教的主要传统之一，以哲学研究、禅修和密续修法的整合为特色。在萨迦内部，宗巴保有其独特身份：道果法的特别传承、与贡噶确德寺相连的历史寺院传统、独特的文本宝藏以及自身的仪轨体系。
  sachen_caption: 萨千昆嘉宁波（1092–1158），萨迦派五位开宗祖师中的第一位。历史壁画，贡噶确德寺，西藏拉孜。
origin:
  title: 起源与历史
  p1: 宗巴传统的根源在于伟大萨迦上师的传承，其中包括喇嘛当巴索南坚赞（1312–1375）和大乘法主昆嘉扎西。其后来形式——贡噶宗巴——由多杰丹巴昆嘉南嘉（1432–1496）奠定，他是一位密续上师、学者和萨迦传统的持有者。
  p2: 根据传统，第一位多杰丹巴被莲花生大师预言为其弟子纳南多杰杜炯的转世，预言他将以名为昆嘉的僧侣身份出现在西藏中部，阐明密续。
gongkar_choede:
  title: 贡噶确德寺，主要寺院
  p1: 1464年，多杰丹巴昆嘉南嘉在西藏中部藏布江以南的拉孜地区创建了贡噶确德寺（又称贡噶多杰殿）。该寺成为宗巴传承的主要中心，以及修习道果法、密续仪轨、坛城法轮、喜金刚教法、萨迦护法和寺院生活的杰出场所。
  p2: 其肯瑞风格壁画是十五世纪藏传佛教最杰出的艺术表达之一。其恰姆仪轨舞蹈——源于第一位多杰丹巴的神圣异象——也是传承活态遗产的一部分。
  khyenri_caption: 释迦牟尼佛触地印，肯瑞风格壁画。贡噶确德寺，十五世纪。
dalai_lama:
  title: 与达赖喇嘛的联系
  p1: 第五世达赖喇嘛（1642–1682）对这一传承怀有深厚的敬仰之情。他将布达拉宫立体金制时轮金刚坛城的保管托付给贡噶确德寺，寺中僧侣在其中代代进行时轮金刚仪轨，祈求世界和平。他还在布达拉宫山脚的村庄建立了邹勒曲仁拉康，以便贡噶确德寺的僧侣在那里进行白度母长寿和治愈仪轨。
  p2: 同样，紧邻拉萨觉囊寺的美如宁巴拉康也被托付给他们，以便进行供奉其守护神婆罗门相大黑天的护法仪轨。从那时起，多杰丹巴仁波切和贡噶确德寺的宗巴僧侣与历任达赖喇嘛保持了特殊的亲近关系。
core_practices:
  title: 特色修法与教法
  intro: 萨迦宗巴传统保存了丰富的修法宝藏：
  practice_list:
  - title: 道果法。
    text: 「道与其果」，萨迦传统的核心教法，通过与宗巴传承上师相关的特别传承线脉传授。
  - title: 喜金刚法轮。
    text: 与道果法不可分割，包括坛城修习和相关密续修法。
  - title: 四部密续坛城。
    text: 由多杰丹巴昆嘉南嘉建立的广泛坛城仪轨法轮。
  - title: 大黑天护法。
    text: 尤其是幡帐、四面和婆罗门相大黑天——传统的特有护法。
  - title: 普巴金刚。
    text: 历史上与寺院场地的净化和开光相关的修法。
  - title: 时轮金刚与白度母。
    text: 自与第五世达赖喇嘛联系以来特别重要的仪轨。
  - title: 恰姆舞蹈。
    text: 源于第一位多杰丹巴神圣异象的仪轨舞蹈礼仪。
  brahmanrupa_caption: 婆罗门相大黑天，宗巴传统的守护主尊。
succession:
  title: 传承接续与延续
  p1: 多杰丹巴仁波切的传承接续保存了贡噶宗巴的精神连续性。第一位多杰丹巴，尊者古昆嘉南嘉（1432–1496），创建了贡噶确德寺。第五位多杰丹巴祖古，蒋巴隆托切吉坚赞（1928–1959），在拉萨起义期间圆寂，中断了他当时所持的传承线脉。
  p2: 传统通过1989年现任第六世贡噶多杰丹巴仁波切被达赖喇嘛认定，以及2003年贡噶确德寺在德拉敦（印度）重建而得以恢复。
preservation:
  title: 当代传承保护
  p1: 经历二十世纪的艰难时期后，宗巴传承正在经历仍在延续至今的恢复与保护过程：在流亡地重建寺院生活、修复仪轨和礼仪文本、恢复道果法教学和仪轨法轮，以及培养新一代修行者。
  p2: Dzongpa Europa 是这一保护运动的组成部分，致力于使萨迦宗巴传承的教法、文化和修法在欧洲得以传播。
brahmanrupa_story:
  section_title: 婆罗门大黑天的神圣起源
  section_subtitle: 宗巴护法的一个故事
  statue_photo:
    src: /assets/img/linaje-gongkar/lin-06-brahman-mahakala-estatua-gongkar-choede.jpg
    alt: 贡噶确德寺贡噶肯则钦莫依据多杰丹巴昆嘉南嘉的异象所造婆罗门大黑天像
    caption: 贡噶肯则钦莫依据多杰丹巴昆嘉南嘉的异象所造婆罗门大黑天像。贡噶确德寺，西藏拉孜。
  p1: 第一位多杰丹巴昆嘉南嘉与四面大黑天作为其法护之间有着特别密切的联系。
  p2: 这位法护源于龙树所传授的密集金刚续的印度传承，以一位婆罗门——印度圣人——的面貌被带入西藏，在萨千昆嘉宁波时代成为萨迦传统的主要护法之一。
  p3: 护法消除了众多障碍，数代以来为萨迦传统带来了巨大利益。他乔装出现，因为四面形相是内在形相，被视为秘密。在萨迦祭坛上只显示婆罗门的外在形相。
  p4: 当多杰丹巴昆嘉南嘉还很年轻时，他在净相中看到了他的法护。大黑天对他说：
  blockquote: 「我是你的朋友，我将为你效力。」
  p5: 从那以后，他便作为其护法而服务。
  p6: 后来，多杰丹巴昆嘉南嘉出家受戒后，他前往萨迦朝圣，并参访了附近一处名为考扎宗的大黑天圣地。在那里，他进行了精心的大黑天供养，并能听到股骨号角的声音，尽管没有人在吹奏。
  p7: 他循声而去，看见他的法护以婆罗门的面貌坐在一个山洞中。在那次相遇中，大黑天将其心脏命力奉献给多杰丹巴昆嘉南嘉，承诺以一切可能的方式服务于他并帮助完成他的佛法事业。
  p8: 那次经历之后，多杰丹巴昆嘉南嘉著名的艺术家弟子贡噶肯则钦莫，依照其上师所描述的婆罗门形相，完全按照描述制造了一尊像：吹奏股骨号角。
  mural_photo:
    src: /assets/img/linaje-gongkar/lin-08-mural-primer-dorje-denpa-gongkar-choede.jpg
    alt: 贡噶确德寺第一位多杰丹巴尊者古昆嘉南嘉的古代壁画
    caption: 第一位多杰丹巴尊者古昆嘉南嘉（1432–1496）壁画。贡噶确德寺，西藏拉孜。
  p9: 这种描绘婆罗门的形式在西藏中部变得非常流行。在拉萨首都最神圣的觉囊寺附近，建立了一座供奉这尊像的圣地。这座圣地被命名为美如宁巴拉康。
  p10: 在贡噶多杰殿鼎盛时期，据说在这座拉康向佛像所做的供养足以满足贡噶多杰殿全体僧伽的物质需求，该僧团由近三千名僧侣组成。
  p11: 这是因为人们对这一纯净的大黑天供养传承——用于护佑和克服障碍——怀有极大的信心。不仅藏族人：数百年来前来参访的汉族和维吾尔族商人也向圣地供奉，这座圣地至今仍然存在。
  p12: 幸运的是，对于宗巴社区而言，多杰丹巴昆嘉南嘉向大黑天所进行的供养和祈祷在继续，这要归功于尊贵的贡噶多杰丹巴仁波切慈悲地定期为我们所有人进行这些仪轨。
  altar_photo:
    src: /assets/img/linaje-gongkar/lin-07-altar-gongkar-choede-v-dorjedenpa-retrato.jpg
    alt: 贡噶确德寺祭坛，附有第五位多杰丹巴祖古的画像
    caption: 贡噶确德寺内殿祭坛，附有第五位多杰丹巴祖古蒋巴隆托切吉坚赞（1928–1959）的画像。
  attribution_text: 文字：迦叶比丘
  attribution_photos: 照片和视频：昆嘉俊努
