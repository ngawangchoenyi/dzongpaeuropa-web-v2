  description: "Dzongpa 文化协会与 Dzongpa Europa 项目，致力于在欧洲保存萨迦宗巴传承。"
  slug: about
  active: about
  es_slug: quienes-somos

header:
  title: "我们是谁"
  lede: "一个致力于保存萨迦宗巴传承的文化协会"

association:
  title: "协会"
  p1: "Dzongpa 文化协会是一个非营利实体，致力于推广藏族文化、学习藏传佛教、实践禅修，并保存宗巴传承的教法。"
  p2: "协会成立的目的，是创造一个开放、尊重且稳定的空间，让有兴趣的人能够接近佛法、参与文化活动、接受教法、修习禅修，并共同参与有益于社区的项目。"

dzongpa_europa:
  title: "Dzongpa Europa"
  p1: "Dzongpa Europa 是协会工作在欧洲的延伸。在尊贵的第六世贡噶多杰丹巴仁波切的指导下，本项目希望在宗巴传承的藏传传统与欧洲有兴趣的人之间建立桥梁。它是一个国际网络的一部分，在印度、台湾、英国、西班牙、澳大利亚和香港均设有中心，以及根本寺院贡噶确德。"

purpose:
  title: "我们的目标"
  p1: "致力于保持宗巴传承的佛法教义的活力与可及性，通过创造适当条件来邀请上师、组织闭关、翻译文本、支持定期活动，并在欧洲建立一个稳固的修行者和支持者社区。"

core_values:
  title: "价值观"
  items:
    - title: "真实性。"
      text: "忠实于传承，以及仁波切和萨迦宗巴传统具格上师所传授的教法。"
    - title: "开放性。"
      text: "包容地欢迎不同背景、年龄、文化和修行程度的人。"
    - title: "服务。"
      text: "致力于利益众生和服务当地社区。"
    - title: "透明。"
      text: "清晰的财务管理、问责和开放沟通。"
    - title: "可持续性。"
      text: "在项目成长与保持其精神身份之间取得平衡。"

closing:
  p1: "Dzongpa Europa 依靠其会员和捐助者的承诺而运作。每一位加入的人都为使佛法教义和藏族文化今天和未来对更多人可及而做出贡献。"
  cta_text: "阅读 Dzongpa 在西班牙的历史 →"
  cta_href: "/zh/history"

