donations:
  title: "建议供养仁波切"
  intro: "供养有助于支持仁波切的弘法事业和传承修法的持续。参加需提前登记。建议供养为个人8欧元或家庭15欧元。"
  bizum:
    title: "Bizum（仅限西班牙）"
    text: "如果您有西班牙银行账户，可通过银行APP的Bizum进行供养。"
    steps:
      - "在银行APP中打开Bizum。"
      - '选择「捐款」或「NGO捐款」选项。'
      - "输入编号06845。"
      - '选择「Asociación Cultural Dzongpa」。'
      - "输入供养金额。"
  transfer:
    title: "银行转账"
    text: "您也可以进行银行转账。如果您的银行支持即时转账，可使用此方式。"
    holder: "Asociación Cultural Dzongpa"
    bank: "Caixa Popular"
    iban: "ES69 3159 0049 8128 4488 3229"
    concept: "Puja + 姓名"
  card:
    title: "刷卡支付"
    text: "您也可以通过Stripe进行安全的刷卡供养。此方式对西班牙境外的人士尤为便捷。"
    note: "刷卡支付可能产生手续费。如您愿意，可自愿额外添加少量金额以帮助抵扣手续费。"
    btn_individual: "个人供养 · 8€"
    btn_family: "家庭供养 · 15€"
    btn_free: "随喜供养"
    url_individual: "https://donate.stripe.com/00wdR8eMl2xn6Qaa1Za3u06?locale=zh-CN"
    url_family: "https://donate.stripe.com/3cIaEW0Vvc7Xcaub63a3u07?locale=zh-CN"
    url_free: "https://buy.stripe.com/fZuaEW1Zzc7X2zU5LJa3u00?locale=zh-CN"

newsletter:
  title: "邮件通知"
  text: "已登记或订阅通讯的人员将收到每周法事的通知和提醒。具体修法确认后，Dzongpa Europa将发送相应信息的通知。"
  reminder: "计划在法事确认后（通常提前3至5天）发送通知，并在修法前向已登记者发送提醒。"
