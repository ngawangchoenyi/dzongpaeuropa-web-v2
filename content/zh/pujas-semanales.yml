practices:
  title: "常见修法"
  intro: "法事可能包括龙巴传承的以下修法（不限于此）："
  list:
    - name: "绿度母"
      desc: "度母的修法，是保护和解脱障碍的源泉。"
    - name: "婆罗门相大黑天"
      desc: "龙巴传承600余年的护法，与仁波切有特殊缘起。"
    - name: "财宝天王"
      desc: "掌管精神与物质财富与丰盛的本尊。"
    - name: "龙巴白象鼻财神"
      desc: "龙巴传承的稀有修法，增长财富并圆满福德。"
    - name: "四臂观世音"
      desc: "大悲者，为利益一切众生的核心修法。"
    - name: "金刚火焰火供"
      desc: "火供，用于净化负面业力，消除内外障碍。"
    - name: "荟供"
      desc: "积累福慧资粮，恢复誓言与戒律。"

