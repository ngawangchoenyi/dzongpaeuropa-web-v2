header:
  title: "仁波切从台湾主持每周法事"
  lede: "每周六，贡卡多杰登巴仁波切从台湾龙巴中心主持不同的法事和传承修法。"

intro: "这些活动让社区能够定期与传承的加持相连，并支持仁波切的弘法事业。具体修法通常提前3至5天公布，参加前需提前登记。"

