header:
  title: 活动
  lede: 禅修、学习、闭关与社区生活
lead: Dzongpa Europa 定期举办各类活动，旨在将佛法教义和藏族文化带给各种背景的人。我们将面向初学者的开放修习与面向常规修行者和会员的深度空间相结合。
types_title: 活动类型
med:
  h3: 引导禅修
  p: 定期禅修聚会，旨在培养心灵安住、正念、慈悲和内在清明。向有无经验的人士开放。
study:
  h3: 佛法学习
  p: 关于藏传佛教、传统典籍、传承上师教法和佛道基本原则的入门及学习课程。
talks:
  h3: 文化讲座
  p: 关于藏族文化、佛教历史、神圣艺术、图像学、仪轨、语言和喜马拉雅精神传统的开放活动。
retreats:
  h3: 闭关与教法
  p: 与合格上师共同在瓦伦西亚及欧洲其他地方组织闭关、课程和教法，并有可能迎请仁波切亲临。
community:
  h3: 社区与义工
  p: 为会员、修行者和支持者提供相聚空间，以及在组织、传播、翻译、后勤和活动支持方面的合作机会。
