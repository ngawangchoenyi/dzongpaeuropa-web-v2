header:
  title: 成为会员
  lede: 让我们共同护持传承的保存
lead: 成为 Dzongpa 文化协会的会员是直接支持 Dzongpa Europa 发展的方式，有助于让更多人接触佛法教义。
p2: 会员的贡献使覆盖基本费用、组织活动、邀请上师、租用场地、翻译材料、维护网站以及为未来闭关和教法创建稳定基金成为可能。
p3: 每一份贡献，无论大小，都有助于创造条件，使藏族文化和宗巴传承佛教能在我们的社区中蓬勃发展。
gallery_alts:
- Dzongpa Europa 瓦伦西亚社区
- 社区在教法期间共进餐食
