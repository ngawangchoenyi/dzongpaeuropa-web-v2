benefits_title: 会员权益
benefits_all_intro: 所有会员均可获得：
benefits_all:
- 订阅协会月度通讯。
- 活动、闭关和上师访问的优先通知。
- 访问会员专属社区内部频道。
- 闭关及特邀上师活动的优惠票价。
- 年度捐款证明（用于报税）。
benefits_upper_intro: 支持者、护持者和施主还可额外享有：
benefits_upper:
- 名额有限的特别活动预留席位。
- 可选择作为项目支持者公开致谢。
- 受邀参加协会年度领导层会议。
cancel_text: 可随时发送邮件至 <a href="mailto:secretaria@dzongpaeuropa.org">secretaria@dzongpaeuropa.org</a>
  修改或取消会费。
