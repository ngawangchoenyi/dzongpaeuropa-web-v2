header:
  title: Contacto
  lede: Estamos aquí para ayudarte
lead: Si deseas recibir información, participar en actividades, hacerte socio, colaborar
  como voluntario o apoyar el proyecto, escríbenos. Atendemos las consultas en español,
  inglés y chino.
write_title: Escríbenos
write_intro: ¿Prefieres escribirnos directamente? Mándanos un correo a <a href="mailto:secretaria@dzongpaeuropa.org"><strong>secretaria@dzongpaeuropa.org</strong></a>
  y te responderemos lo antes posible.
form_ok_title: Mensaje enviado
form_ok_text: Gracias por escribirnos. Te responderemos en un plazo de 3 a 5 días
  laborables.
form_err_text: Ha ocurrido un error al enviar el mensaje. Por favor inténtalo de nuevo
  o escríbenos directamente a <a href="mailto:secretaria@dzongpaeuropa.org" style="color:#c0392b;
  font-weight:600;">secretaria@dzongpaeuropa.org</a>.
