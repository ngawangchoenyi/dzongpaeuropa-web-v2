header:
  title: "Prácticas y deidades del linaje Dzongpa"
  lede: "Una guía divulgativa para comprender el sentido tradicional de las prácticas y pujas habituales."
intro: "Este catálogo reúne descripciones públicas de prácticas y deidades asociadas al linaje Sakya Dzongpa. Su finalidad es ofrecer contexto cultural, histórico y devocional a las personas que participan en las actividades de Dzongpa Europa."
nota_contexto: "Las expresiones tradicionales sobre protección, obstáculos, longevidad, purificación o riqueza se presentan en su marco religioso y simbólico propio. No constituyen promesas médicas, psicológicas, económicas ni sustituyen atención profesional."
nota_restringidas: "Algunas prácticas requieren transmisión, permiso o instrucciones específicas de un maestro cualificado. Cuando una ficha aparece marcada como restringida, se ofrece solo información contextual."
