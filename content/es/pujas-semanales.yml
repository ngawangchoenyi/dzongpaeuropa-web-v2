  title: "Pujas semanales con Rinpoche · Dzongpa Europa"
  description: "Pujas semanales con S. Em.ª Gongkar Dorje Dhenpa Rinpoche desde el centro Dzongpa de Taiwán. Registro previo, calendario y donativos para sostener las actividades del linaje."
  slug: pujas-semanales
  en_slug: weekly-pujas
  active: actividades
  robots: "index, follow"

header:
  title: "Pujas semanales con Rinpoche desde Taiwán"
  lede: "Cada sábado, S. Em.ª Gongkar Dorje Dhenpa Rinpoche realiza diferentes pujas y prácticas del linaje desde el centro Dzongpa de Taiwán."

intro: "Estas actividades permiten a la comunidad conectar regularmente con las bendiciones del linaje y sostener las actividades de Rinpoche. La práctica concreta suele comunicarse con 3 a 5 días de antelación y la participación requiere registro previo."

pending_puja:
  badge: "Próxima puja pendiente de confirmar"
  title: "Próxima puja pendiente de confirmar"
  text: "Todavía no hay fecha confirmada para la próxima puja semanal. Actualizaremos esta página cuando la práctica esté confirmada."
  note: "Cuando se publique la próxima puja, volverán a aparecer el registro y las opciones de donativo."

schedule:
