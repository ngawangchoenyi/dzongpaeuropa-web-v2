header:
  title: Su Eminencia el VI Gongkar Dorje Dhenpa Rinpoche
  lede: Tenzin Jampal Lungtok Namgyal · Cabeza Suprema del linaje Dzongpa de la tradición
    Sakya
hero_alt: Su Eminencia el VI Gongkar Dorje Dhenpa Rinpoche en trono ceremonial
lead: Su Eminencia el VI Gongkar Dorje Dhenpa Rinpoche, Tenzin Jampal Lungtok Namgyal,
  es la Cabeza Suprema del linaje Dzongpa de la tradición Sakya del budismo tibetano.
  Nacido en 1977 en Arunachal Pradesh, en el noreste de India y cerca de la frontera
  tibetana, su vida y su enseñanza están dedicadas a la preservación de la tradición
  Dzongpa y al beneficio de los seres.
tulku:
  title: Reconocimiento como tulku
  p1: Su predecesor, el V Dorjedenpa Tulku, falleció prematuramente en el Tíbet en
    1959 durante el levantamiento de Lhasa. Los monjes del linaje Dzongpa preguntaron
    repetidamente a Su Santidad el Dalái Lama si su maestro había reencarnado. Tras
    un examen cuidadoso, Su Santidad les indicó que orientaran la búsqueda hacia el
    noreste de India, cerca de la frontera tibetana.
  p2: En 1989, Rinpoche fue encontrado en Arunachal Pradesh y reconocido por Su Santidad
    el Dalái Lama, quien le otorgó la ceremonia del corte de cabello y le impuso el
    nombre de Tenzin Jampal Lungtok. Posteriormente, Su Eminencia el difunto Chogye
    Trichen Rinpoche extendió su nombre a Tenzin Jampal Lungtok Namgyal.
  dal02_caption: Su Santidad el XIV Dalái Lama reconoció oficialmente a Rinpoche como
    reencarnación del V Dorjedenpa Tulku en 1989.
training:
  title: Formación
  p1: Su Santidad el Dalái Lama subrayó la importancia de que Rinpoche recibiera una
    formación profunda y exhaustiva. Así, ingresó como el alumno más joven en el Sakya
    College de Dehradun, bajo la tutela del difunto Khenpo Migmar Tsering, donde se
    graduó con distinción en 1999.
  p2: Además de dominar los trece grandes shastras de la tradición Nalanda, tal como
    se enseñan en la tradición Sakya, Rinpoche recibió el Compendio de Tantras, el
    Compendio de Sadhanas, el Lamdré completo y numerosos empoderamientos, transmisiones
    e instrucciones tántricas de manos de Su Santidad el 41º Sakya Trichen y de otros
    grandes maestros del linaje.
gongkar:
  title: Restablecimiento de Gongkar Choede
  p1: En 2003, Rinpoche restableció el monasterio de Gongkar Choede en Dehradun, India,
    dando continuidad en el exilio a la sede principal del linaje, fundada originalmente
    en el Tíbet en 1464. El monasterio fue inaugurado por Su Santidad el Dalái Lama,
    y en ese mismo acto Rinpoche fue entronizado como Lama Cabeza del linaje por Su
    Santidad el 41º Sakya Trichen.
  p2: En el monasterio, Rinpoche realizó numerosos retiros de meditación y dominó
    los rituales tántricos del linaje, asumiendo plenamente la responsabilidad de
    su preservación.
  dal03_caption: Las dos máximas autoridades espirituales que han bendecido la trayectoria
    de Rinpoche.
international:
  title: Actividad internacional
  p1: Desde 2005, Rinpoche viaja internacionalmente para ofrecer enseñanzas budistas
    en distintos lugares del mundo. Estableció la Sakya Dzongpa Vajrayana Community
    en Taipéi, donde imparte enseñanzas regulares, y desde entonces se han ido formando
    comunidades de práctica vinculadas al linaje en India, Taiwán, Reino Unido, España,
    Australia y Hong Kong.
  p2: A petición de los budistas locales de Arunachal Pradesh, su tierra natal, Rinpoche
    ha emprendido el proyecto de establecer Gongkar Dorje Den allí, como una base
    mayor desde la cual la tradición Dzongpa pueda revivir plenamente.
europa:
  title: Su guía sobre Dzongpa Europa
  p1: La Asociación Cultural Dzongpa y el proyecto Dzongpa Europa se desarrollan bajo
    la inspiración y la dirección espiritual de Rinpoche, con el deseo de crear las
    condiciones adecuadas para que sus enseñanzas y las del linaje Dzongpa puedan
    ser recibidas, estudiadas y practicadas en Europa.
