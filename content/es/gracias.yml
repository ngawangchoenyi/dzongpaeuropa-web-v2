header:
  title: "¡Muchas gracias!"
  lede: Tu generosidad hace posible que las enseñanzas continúen
body:
  p1: Hemos recibido tu donación correctamente. Tu apoyo contribuye directamente a
    preservar y difundir las enseñanzas del linaje Dzongpa en Europa.
  p2: En breve recibirás un correo de confirmación de Stripe con el resumen de tu donación.
    Si necesitas un certificado fiscal, escríbenos a
    <a href="mailto:secretaria@dzongpaeuropa.org">secretaria@dzongpaeuropa.org</a>
    indicando tu nombre completo y dirección postal.
