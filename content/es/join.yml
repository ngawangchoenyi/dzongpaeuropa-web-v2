  title: Hazte socio · Dzongpa Europa
  description: "Hazte socio Amigo, Sostenedor, Protector o Benefactor y sostén las enseñanzas, los retiros y la preservación del linaje Sakya Dzongpa en Europa."
  slug: hazte-socio
