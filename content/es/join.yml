header:
  title: Hazte socio
  lede: Sostén juntos la preservación del linaje
lead: Hacerse socio de la Asociación Cultural Dzongpa es una forma directa de sostener
  el crecimiento de Dzongpa Europa y contribuir a que las enseñanzas del Dharma puedan
  estar disponibles para más personas.
p2: Las aportaciones de los socios permiten cubrir gastos básicos, organizar actividades,
  invitar maestros, alquilar espacios, traducir materiales, mantener la página web
  y crear un fondo estable para futuros retiros y enseñanzas.
p3: Cada aportación, grande o pequeña, ayuda a crear las condiciones para que la cultura
  tibetana y el budismo del linaje Dzongpa puedan florecer en nuestra comunidad.
gallery_alts:
- Comunidad Dzongpa Europa en Valencia
